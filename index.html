<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=docs/">
  <title>Books</title>
  <link rel="canonical" href="docs/">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f6f2;
      --fg: #1b2028;
      --muted: #6b7280;
      --accent: #2563eb;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111318;
        --fg: #e7e9ee;
        --muted: #9ca3af;
        --accent: #60a5fa;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 2rem;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo",
        "Noto Sans KR", sans-serif;
      line-height: 1.7;
    }
    main {
      width: min(100%, 36rem);
    }
    h1 {
      margin: 0 0 0.5rem;
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      line-height: 1.2;
    }
    p {
      margin: 0 0 1.25rem;
      color: var(--muted);
    }
    a {
      color: var(--accent);
      font-weight: 700;
      text-underline-offset: 0.18em;
    }
  </style>
</head>
<body>
  <main>
    <h1>Books</h1>
    <p>문서 목록으로 이동하고 있습니다.</p>
    <a href="docs/">문서 목록 열기</a>
  </main>
</body>
</html>
