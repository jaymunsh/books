<meta charset="UTF-8">
<title>아파트 경매 완전정복</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="아파트 경매의 권리분석, 입찰, 명도, 대출, 리스크 관리를 실전 흐름으로 정리한 HTML 가이드">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root, :root[data-theme="light"] {
    --bg:#F6F6F3; --paper:#FFFFFF; --sidebar:#FBFBF8;
    --ink:#1B2029; --ink-soft:#525A67; --ink-faint:#8B909C;
    --line:#E7E6E1; --line-soft:#F0EFEA;
    --seal:#B23A2B; --seal-soft:#F5E4E0;
    --navy:#2C3A55; --navy-soft:#E9ECF3;
    --sel:#F1EFE9; --shadow:0 1px 2px rgba(20,24,32,.04),0 8px 28px rgba(20,24,32,.05);
  }
  :root[data-theme="dark"] {
    --bg:#13161B; --paper:#1B1F26; --sidebar:#171A20;
    --ink:#E9E8E2; --ink-soft:#AEB4BE; --ink-faint:#767C88;
    --line:#2A2F38; --line-soft:#22262E;
    --seal:#E1725E; --seal-soft:#37241F;
    --navy:#9FB0D4; --navy-soft:#242B39;
    --sel:#232833; --shadow:0 1px 2px rgba(0,0,0,.2),0 10px 30px rgba(0,0,0,.28);
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme]) {
      --bg:#13161B; --paper:#1B1F26; --sidebar:#171A20;
      --ink:#E9E8E2; --ink-soft:#AEB4BE; --ink-faint:#767C88;
      --line:#2A2F38; --line-soft:#22262E;
      --seal:#E1725E; --seal-soft:#37241F;
      --navy:#9FB0D4; --navy-soft:#242B39;
      --sel:#232833; --shadow:0 1px 2px rgba(0,0,0,.2),0 10px 30px rgba(0,0,0,.28);
    }
  }
  /* 라이트모드가 기본값: 시스템 설정과 무관하게 명시적으로 light를 지정 */

  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; }
  body {
    background:var(--bg); color:var(--ink);
    font-family:"Noto Sans KR","Apple SD Gothic Neo","Malgun Gothic","Noto Sans CJK KR",sans-serif;
    font-size:16px; line-height:1.72; letter-spacing:-.01em;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }
  ::selection { background:var(--seal-soft); }
  a { color:inherit; text-decoration:none; }

  .app { display:grid; grid-template-columns:300px 1fr; min-height:100%; }

  /* ── 헤더(모바일 전용 상단 바) ── */
  .topbar {
    display:none; position:sticky; top:0; z-index:40;
    align-items:center; gap:12px; padding:12px 16px;
    background:color-mix(in srgb, var(--bg) 88%, transparent);
    backdrop-filter:saturate(1.4) blur(8px);
    border-bottom:1px solid var(--line);
  }
  .topbar .brand-min { font-weight:700; font-size:15px; letter-spacing:-.02em; }
  .topbar .brand-min b { color:var(--seal); }
  .iconbtn {
    display:inline-flex; align-items:center; justify-content:center;
    width:38px; height:38px; border:1px solid var(--line); border-radius:9px;
    background:var(--paper); color:var(--ink); cursor:pointer;
    font-size:15px; line-height:1; transition:border-color .15s, background .15s;
  }
  .iconbtn:hover { border-color:var(--ink-faint); }
  .iconbtn:focus-visible { outline:2px solid var(--seal); outline-offset:2px; }
  .spacer { flex:1; }

  /* ── 사이드바(목차) ── */
  .sidebar {
    position:sticky; top:0; align-self:start; height:100vh; overflow-y:auto;
    background:var(--sidebar); border-right:1px solid var(--line);
    padding:22px 14px 40px; scrollbar-width:thin;
  }
  .brand { padding:6px 10px 18px; margin-bottom:6px; border-bottom:1px solid var(--line); }
  .brand .kicker {
    font-size:10.5px; letter-spacing:.28em; color:var(--navy);
    text-transform:uppercase; margin-bottom:9px;
  }
  .brand h1 { font-size:20px; font-weight:800; letter-spacing:-.03em; margin:0; line-height:1.25; }
  .brand h1 b { color:var(--seal); }
  .brand .sub { font-size:11.5px; color:var(--ink-faint); margin-top:7px; line-height:1.5; }
  .brand .author { font-size:12px; color:var(--ink-soft); margin-top:10px; letter-spacing:.02em; }
  .brand .author b { color:var(--ink); font-weight:700; }

  /* 검색 도구 */
  .side-tools { display:flex; gap:8px; align-items:center; padding:12px 6px 4px; }
  .search-wrap { position:relative; flex:1; display:flex; align-items:center; }
  .search-wrap .search-ico { position:absolute; left:11px; font-size:15px; color:var(--ink-faint); pointer-events:none; }
  #search {
    width:100%; box-sizing:border-box; padding:9px 30px 9px 32px; font:inherit; font-size:13.5px;
    color:var(--ink); background:var(--paper); border:1px solid var(--line); border-radius:9px; outline:none;
    transition:border-color .15s;
  }
  #search::placeholder { color:var(--ink-faint); }
  #search:focus { border-color:var(--seal); }
  #search::-webkit-search-cancel-button { display:none; }
  .search-clear {
    position:absolute; right:6px; width:22px; height:22px; border:0; border-radius:6px; cursor:pointer;
    background:var(--sel); color:var(--ink-soft); font-size:11px; line-height:1; display:flex; align-items:center; justify-content:center;
  }
  .search-clear:hover { color:var(--ink); }
  .side-tools .iconbtn { width:38px; height:38px; font-size:13px; flex:none; }

  /* 검색 결과(사이드바) */
  .sresults { padding:4px 2px 24px; display:flex; flex-direction:column; gap:2px; }
  .sresults .sr-head { font-size:11px; letter-spacing:.06em; color:var(--ink-faint); padding:8px 10px 6px; }
  .sresults .sr-head b { color:var(--ink); font-weight:700; }
  .sresults a { display:block; padding:9px 10px; border-radius:8px; }
  .sresults a:hover { background:var(--sel); }
  .sresults .rnum { font-size:11px; color:var(--seal); font-weight:700; margin-right:6px; font-variant-numeric:tabular-nums; }
  .sresults .rtitle { font-size:13px; font-weight:600; color:var(--ink); }
  .sresults .rsnip {
    font-size:11.5px; color:var(--ink-faint); margin-top:4px; line-height:1.5;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  }
  .sresults mark { background:var(--seal-soft); color:var(--seal); border-radius:2px; padding:0 1px; }
  .sresults .none { font-size:12.5px; color:var(--ink-faint); padding:12px 10px; line-height:1.6; }

  /* 용어 사전(부록 A) — 용어 열 강조 */
  .prose table.glossary td:first-child { font-weight:700; color:var(--ink); white-space:nowrap; }

  nav { margin-top:14px; }
  .nav-part { margin-bottom:2px; }
  .part-label {
    display:flex; align-items:baseline; gap:8px; padding:11px 10px 6px;
  }
  .part-label .pnum { font-size:10.5px; font-weight:700; color:var(--seal); letter-spacing:.04em; white-space:nowrap; }
  .part-label .ptitle { font-size:12px; font-weight:700; color:var(--ink-soft); letter-spacing:-.01em; }
  .navlink {
    display:flex; align-items:baseline; gap:8px;
    padding:7px 10px; border-radius:8px; cursor:pointer;
    font-size:13.5px; color:var(--ink-soft); line-height:1.4;
    transition:background .12s, color .12s;
  }
  .navlink:hover { background:var(--sel); color:var(--ink); }
  .navlink.active { background:var(--sel); color:var(--ink); font-weight:600; }
  .navlink.active .cnum { color:var(--seal); }
  .navlink .cnum { font-size:11.5px; color:var(--ink-faint); font-variant-numeric:tabular-nums; min-width:2.6em; white-space:nowrap; }
  .navlink.solo { font-weight:600; color:var(--ink); }

  /* ── 본문 ── */
  .main { min-width:0; display:flex; flex-direction:column; }
  .main-inner { width:100%; max-width:760px; margin:0 auto; padding:40px 32px 88px; flex:1; }

  .crumb { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--ink-faint); margin-bottom:20px; }
  .crumb .dot { width:3px; height:3px; border-radius:50%; background:var(--ink-faint); }

  .doc-head { border-bottom:1px solid var(--line); padding-bottom:22px; margin-bottom:30px; }
  .doc-head .chno { font-size:13px; font-weight:700; color:var(--seal); letter-spacing:.02em; margin-bottom:8px; }
  .doc-head h2 { font-size:clamp(24px,4.5vw,32px); font-weight:800; letter-spacing:-.035em; line-height:1.28; margin:0; text-wrap:balance; }
  .doc-head .meta { display:flex; flex-wrap:wrap; align-items:center; gap:8px; margin-top:14px; }

  .badge { font-size:11.5px; padding:3px 10px; border-radius:999px; white-space:nowrap; letter-spacing:.01em; border:1px solid transparent; }
  .badge.case { background:var(--seal-soft); color:var(--seal); }
  .badge.scen { background:var(--navy-soft); color:var(--navy); }
  .badge.status { background:transparent; border-color:var(--line); color:var(--ink-faint); }
  .badge.status.draft { border-color:var(--navy); color:var(--navy); }

  .lead { font-size:16.5px; color:var(--ink-soft); line-height:1.7; margin:0 0 28px; }

  /* 개요(자리표시자) 리스트 */
  .outline-title { font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-faint); margin:0 0 14px; }
  ol.outline { list-style:none; counter-reset:o; margin:0; padding:0; display:flex; flex-direction:column; gap:2px; }
  ol.outline > li {
    counter-increment:o; position:relative; padding:14px 16px 14px 52px;
    border-radius:11px; background:var(--paper); border:1px solid var(--line-soft);
    box-shadow:var(--shadow); font-size:15px; line-height:1.6; color:var(--ink);
  }
  ol.outline > li::before {
    content:counter(o,decimal-leading-zero); position:absolute; left:16px; top:14px;
    font-size:12px; font-weight:700; color:var(--seal); font-variant-numeric:tabular-nums;
    background:var(--seal-soft); width:24px; height:24px; border-radius:7px;
    display:flex; align-items:center; justify-content:center;
  }
  ol.outline > li .ex { display:block; margin-top:4px; font-size:13px; color:var(--ink-faint); }

  /* 실제 원고 본문 스타일 */
  .prose { font-size:16px; }
  .prose h3 { font-size:20px; font-weight:800; letter-spacing:-.025em; margin:38px 0 14px; scroll-margin-top:70px; }
  .prose h4 { font-size:16px; font-weight:700; letter-spacing:-.02em; margin:26px 0 10px; color:var(--ink); }
  .prose p { margin:0 0 18px; }
  .prose ul, .prose ol { margin:0 0 18px; padding-left:22px; }
  .prose li { margin:7px 0; }
  .prose li::marker { color:var(--ink-faint); }
  .prose b, .prose strong { font-weight:700; }
  .prose em { font-style:normal; color:var(--seal); font-weight:600; }
  .prose a.ref { color:var(--navy); border-bottom:1px solid color-mix(in srgb,var(--navy) 40%,transparent); }
  .prose hr { border:0; border-top:1px solid var(--line); margin:32px 0; }
  .prose .xref { color:var(--ink-faint); font-size:.92em; }

  /* 강조/사례/시나리오/경고/팁/법령 박스 */
  .prose .callout, .prose .box {
    margin:24px 0; padding:16px 18px; border-radius:12px; font-size:15px; line-height:1.66;
  }
  .prose .callout { border-left:3px solid var(--seal); background:var(--seal-soft); border-radius:0 12px 12px 0; }
  .prose .box { border:1px solid var(--line); background:var(--paper); box-shadow:var(--shadow); }
  .prose .box .box-label {
    display:inline-flex; align-items:center; gap:6px; font-size:11.5px; font-weight:700;
    letter-spacing:.08em; text-transform:uppercase; margin-bottom:9px; padding:3px 9px; border-radius:6px;
  }
  .prose .box p:last-child, .prose .box ul:last-child, .prose .box ol:last-child { margin-bottom:0; }
  .prose .box.case  { border-color:color-mix(in srgb,var(--seal) 30%,var(--line)); }
  .prose .box.case  .box-label { background:var(--seal-soft); color:var(--seal); }
  .prose .box.scen  { border-color:color-mix(in srgb,var(--navy) 30%,var(--line)); }
  .prose .box.scen  .box-label { background:var(--navy-soft); color:var(--navy); }
  .prose .box.warn  .box-label { background:var(--seal-soft); color:var(--seal); }
  .prose .box.warn  { border-left:3px solid var(--seal); }
  .prose .box.tip   .box-label { background:var(--navy-soft); color:var(--navy); }
  .prose .box.law   { background:var(--line-soft); }
  .prose .box.law   .box-label { background:transparent; color:var(--ink-faint); border:1px solid var(--line); }
  .prose .box.law   { font-size:14px; color:var(--ink-soft); }

  /* 체크리스트 */
  .prose ul.check { list-style:none; padding-left:0; }
  .prose ul.check li { position:relative; padding-left:30px; margin:9px 0; }
  .prose ul.check li::before {
    content:"☐"; position:absolute; left:4px; top:-1px; color:var(--seal); font-size:16px; font-weight:700;
  }

  /* 단계(steps) */
  .prose ol.steps { list-style:none; counter-reset:s; padding-left:0; }
  .prose ol.steps > li { counter-increment:s; position:relative; padding:2px 0 2px 40px; margin:12px 0; }
  .prose ol.steps > li::before {
    content:counter(s); position:absolute; left:0; top:1px; width:26px; height:26px; border-radius:8px;
    background:var(--navy); color:#fff; font-size:13px; font-weight:700; display:flex; align-items:center; justify-content:center;
  }
  :root[data-theme="dark"] .prose ol.steps > li::before { color:#12151a; }

  /* 표 */
  .prose .table-wrap { overflow-x:auto; margin:22px 0; border:1px solid var(--line); border-radius:12px; }
  .prose table { border-collapse:collapse; width:100%; font-size:14px; min-width:440px; }
  .prose thead th { background:var(--line-soft); color:var(--ink); font-weight:700; text-align:left; }
  .prose th, .prose td { padding:10px 14px; border-bottom:1px solid var(--line); vertical-align:top; }
  .prose tbody tr:last-child td { border-bottom:0; }
  .prose td.num, .prose th.num { text-align:right; font-variant-numeric:tabular-nums; white-space:nowrap; }
  .prose caption {
    caption-side:bottom; text-align:left; font-size:12px; color:var(--ink-faint); line-height:1.55;
    padding:10px 14px; border-top:1px solid var(--line); background:var(--line-soft);
    border-radius:0 0 11px 11px;
  }
  /* 표 아래 각주(캡션을 박스 밖으로 이동) */
  .prose .tbl-note { margin:-14px 2px 26px; font-size:12px; color:var(--ink-faint); line-height:1.6; }
  .prose .tbl-note::before { content:"※ "; color:var(--ink-faint); }

  /* 핵심 요약 / 한 줄 정리 */
  .prose .keytake {
    margin:26px 0; padding:18px 20px; border:1px dashed var(--seal); border-radius:12px; background:var(--seal-soft);
  }
  .prose .keytake .kt-label { font-size:11.5px; font-weight:700; letter-spacing:.1em; color:var(--seal); text-transform:uppercase; margin-bottom:8px; }
  .prose .keytake ul { margin:0; padding-left:20px; }

  /* 출처/각주 */
  .prose .sources { margin-top:34px; padding-top:18px; border-top:1px solid var(--line); font-size:12.5px; color:var(--ink-faint); }
  .prose .sources h4 { font-size:11.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-faint); margin:0 0 8px; }
  .prose .sources ul { padding-left:18px; margin:0; }
  .prose .sources li { margin:4px 0; }

  /* 이전/다음 */
  .pager { display:flex; gap:12px; margin-top:44px; padding-top:26px; border-top:1px solid var(--line); }
  .pager a {
    flex:1; padding:14px 16px; border:1px solid var(--line); border-radius:12px;
    background:var(--paper); transition:border-color .15s, transform .15s; min-width:0;
  }
  .pager a:hover { border-color:var(--ink-faint); }
  .pager a.next { text-align:right; }
  .pager .dir { font-size:11.5px; color:var(--ink-faint); letter-spacing:.06em; }
  .pager .t { font-size:14px; font-weight:600; color:var(--ink); margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .pager a.disabled { opacity:.4; pointer-events:none; }

  footer.foot { text-align:center; font-size:12px; color:var(--ink-faint); padding:22px; border-top:1px solid var(--line); }

  /* 백드롭(모바일 드로어) */
  .backdrop { display:none; position:fixed; inset:0; z-index:30; background:rgba(10,12,16,.44); }

  /* ── 반응형 ── */
  @media (max-width:900px) {
    .app { grid-template-columns:1fr; }
    .topbar { display:flex; }
    .sidebar {
      position:fixed; top:0; left:0; z-index:35; height:100vh; width:290px; max-width:84vw;
      transform:translateX(-100%); transition:transform .26s cubic-bezier(.4,0,.2,1);
      box-shadow:var(--shadow);
    }
    body.nav-open .sidebar { transform:translateX(0); }
    body.nav-open .backdrop { display:block; }
    .main-inner { padding:26px 20px 72px; }
  }
  @media (prefers-reduced-motion:reduce) { * { transition:none !important; } }
</style>

<div class="app">
  <!-- 모바일 상단 바 -->
  <div class="topbar">
    <button class="iconbtn" id="menuBtn" aria-label="목차 열기">☰</button>
    <span class="brand-min">아파트 경매 <b>완전정복</b></span>
    <span class="spacer"></span>
    <button class="iconbtn" id="themeBtn2" aria-label="테마 전환">◐</button>
  </div>

  <!-- 사이드바 -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="kicker">부동산 경매 실전 가이드</div>
      <h1>아파트 경매 <b>완전정복</b></h1>
      <div class="sub">입문 → 기초 → 실전 → 심화 · 전 6부 27장 + 부록</div>
      <div class="author">지은이 <b>문성혁</b></div>
    </div>
    <div class="side-tools">
      <div class="search-wrap">
        <span class="search-ico" aria-hidden="true">⌕</span>
        <input id="search" type="search" placeholder="본문 검색 (예: 대항력)" autocomplete="off" spellcheck="false" aria-label="본문 검색">
        <button id="searchClear" class="search-clear" aria-label="검색 지우기" hidden>✕</button>
      </div>
      <button class="iconbtn" id="themeBtn" aria-label="테마 전환">◐</button>
    </div>
    <nav id="nav"></nav>
    <div id="searchResults" class="sresults" hidden></div>
  </aside>

  <!-- 본문 -->
  <main class="main">

  </main>
</div>

<div class="backdrop" id="backdrop"></div>

<script>
CONTENT['epilogue'] = `
<p>여기까지 왔다면 당신은 이제 등기부를 읽을 줄 알고, 말소기준권리를 찾을 줄 알며, 입찰표의 숫자 칸을 어떻게 채우는지 안다. 그런데 이 책을 닫기 전에 딱 하나만 더 말하고 싶다. 경매에서 오래 살아남는 사람과 한두 번 크게 벌고 사라지는 사람을 가르는 것은 <em>지식이 아니라 태도</em>라는 사실이다. 기술은 이 책 안에 다 있다. 태도는 당신이 현장에서 매번 다시 선택해야 한다.</p>

<h3>수익률보다 오래 살아남기</h3>
<p>초보일수록 "얼마 벌었는가"를 묻는다. 오래 한 사람일수록 "얼마나 잃지 않았는가"를 묻는다. 이 차이는 사소해 보이지만 결과를 완전히 갈라놓는다. 한 건에서 30퍼센트를 벌어도 다음 한 건에서 원금을 절반 날리면, 산술적으로 당신은 뒤로 물러난 것이다. 경매는 매주 새 물건이 나오는 시장이다. 오늘 놓친 물건은 아쉽지만, 오늘 잘못 잡은 물건은 몇 달, 때로는 몇 년을 붙잡는다.</p>
<p>그래서 실력 있는 투자자는 두 가지를 지킨다. 첫째, <b>현금흐름을 절대 끊기지 않게 한다.</b> 잔금 대출이 막힐 경우, 명도가 예상보다 길어질 경우, 공실이 석 달 이어질 경우 — 이 세 가지가 동시에 와도 버틸 수 있는 여유 자금을 남기고 입찰한다. 보증금을 몰수당하는 사람의 대부분은 물건을 잘못 봐서가 아니라 <em>돈줄이 끊겨서</em> 무너진다.</p>
<p>둘째, <b>모르는 것에는 입찰하지 않는다.</b> 유치권, 지분, 대지권미등기, 선순위 임차인 — 이런 물건에 수익이 숨어 있는 것은 맞다. 다만 그것은 "정확히 아는 사람"에게만 수익이고, 어설프게 아는 사람에게는 함정이다. 겁먹고 다 피하라는 말이 아니다. <b>공부해서 아는 물건의 범위를 넓혀가되, 그 경계 밖으로는 돈을 걸지 말라</b>는 말이다. 살아남는 것이 먼저고, 잘하는 것은 그다음이다.</p>

<div class="callout">경매에서 파산하는 방법은 두 가지다. 물건을 잘못 보거나, 자기 자금을 잘못 관리하거나. 그런데 경험 많은 사람조차 대부분은 후자로 무너진다. <b>리스크 관리는 실력의 반대말이 아니라, 실력의 완성이다.</b></div>

<h3>시장 사이클과 함께 투자하기</h3>
<p>경매 물건 수는 시장의 체온계다. 전국 주거시설 경매 진행 건수는 2021년 4만 8,280건에서 2024년 10만 8,742건으로 두 배를 넘겼고, 2024년 신청 건수는 11만 9,312건으로 15년 만에 가장 많았다. 2026년 1분기 신청 건수는 13년 만에 최대치를 기록했다. 이 숫자들은 추상적인 통계가 아니라, 전세사기와 역전세, 고금리에 무너진 누군가의 삶이 매물로 쏟아져 나온 흔적이다. 물량이 늘면 선택지가 늘고, 급하게 팔지 않아도 되니 협상력도 당신 쪽으로 온다.</p>
<p>동시에 낙찰가율은 시장의 온도를 보여준다. 서울 아파트 낙찰가율은 2025년 11월 101.4퍼센트로 3년 4개월 만에 100퍼센트를 넘어섰고, 2026년 1월 107.8퍼센트까지 올랐다가 봄에는 다시 100퍼센트대로 내려왔다. 평균 응찰자 수도 2025년 12월 7.8명에서 2026년 5월 5.9명으로 줄며 과열이 진정되는 조짐을 보였다. 물량은 넘치는데 낙찰가율이 감정가를 넘긴다는 것은, 다른 이유로 수요가 몰렸다는 뜻이다. 2025년 10·15 대책 이후 경매가 토지거래허가와 실거주의무를 피할 수 있는 통로가 되면서 규제 회피 수요가 법정으로 몰린 것이 큰 동인이었다.</p>
<p>여기서 배울 교훈은 단순하다. <b>남들이 뜨거울 때는 식히고, 남들이 식을 때는 데운다.</b> 낙찰가율이 감정가를 넘고 응찰자가 열 명씩 붙는 시기에는 굳이 무리하지 않는다. 그 열기는 경매의 본래 이점인 "싸게 사는 것"을 지워버리기 때문이다. 반대로 물량이 쏟아지고 응찰자가 줄어드는 시기, 모두가 "지금은 아니다"라고 말하는 그 순간이 오히려 경매의 원리가 다시 작동하는 때다. 시장을 이기려 하지 말고, 시장의 리듬에 몸을 맞춰라.</p>

<p>이 책의 첫 장에서 나는 첫 입찰의 실수를 고백했다. 마지막 장에서는 이렇게 정리하고 싶다. 경매는 똑똑한 사람이 이기는 게임이 아니라, <em>준비된 사람이 살아남는 게임</em>이다. 조급함을 이기는 태도, 모르는 것을 인정하는 태도, 이길 수 있을 때만 거는 태도 — 이 세 가지가 어떤 권리분석 기술보다 당신을 오래 지켜줄 것이다. 다음 주에도 법원에서는 경매가 열린다. 서두르지 말고, 그러나 멈추지도 말고, 준비된 채로 그 시장에 서라. 당신의 첫 낙찰을 응원한다.</p>

<p>경매를 처음 접하는 당신에게 이 장은 지도의 첫 페이지다. 뉴스에서 "아파트가 감정가의 70%에 낙찰됐다"는 소식을 들어도, 그 아파트가 왜 법원에 나왔는지, 누가 팔고 누가 사는지, 그 돈은 어디로 가는지 아무도 친절히 설명해 주지 않는다. 경매란 결국 <b>빚을 갚지 못한 사람의 재산을, 법원이 대신 팔아 채권자에게 나눠 주는 국가의 절차</b>다. 이 문장 하나에 경매의 모든 것이 압축되어 있다. 이 장에서는 그 문장을 한 조각씩 풀어, 당신이 앞으로 만날 모든 용어와 절차의 뿌리를 먼저 심어 둔다.</p>

<h3>빚을 갚지 못하면 벌어지는 일</h3>
<p>한 사람이 은행에서 3억 원을 빌려 아파트를 샀다고 하자. 은행은 돈을 그냥 빌려주지 않는다. 그 아파트에 <em>근저당권</em>이라는 표식을 등기부에 남긴다. "이 집은 내 대출의 담보다. 돈을 안 갚으면 이 집을 팔아서 회수하겠다"는 공개 선언이다. 대출자가 이자를 몇 달 연체하고 원금 상환도 멈추면, 은행은 더 기다리지 않는다. 담보로 잡아 둔 집을 현금으로 바꿔야 하는데, 은행이 직접 집을 내다 팔 수는 없다. 그래서 법원에 "이 담보물을 팔아 달라"고 신청한다. 이것이 경매의 탄생이다.</p>
<p>여기서 두 갈래 길이 갈린다. 하나는 <b>담보를 이미 잡아 둔 채권자</b>가 곧바로 실행하는 길이고, 다른 하나는 <b>담보가 없던 채권자가 법원 판결을 먼저 받아</b> 실행하는 길이다. 친구에게 돈을 빌려주고 못 받은 사람, 물건값을 떼인 거래처, 세금을 못 받은 국가는 담보가 없다. 이들은 소송을 걸어 "피고는 원고에게 얼마를 지급하라"는 <em>판결</em>이라는 종이를 손에 넣어야만 비로소 상대의 재산에 손을 댈 수 있다. 이 판결처럼 강제집행의 근거가 되는 문서를 <em>집행권원</em>이라 부른다.</p>
<p>정리하면 이렇다. 담보물권(근저당 등)을 실행하는 경매는 판결이 필요 없고, 담보 없는 채권으로 하는 경매는 판결(집행권원)이 반드시 필요하다. 이 한 끗 차이가 경매를 두 종류로 가른다.</p>

<h3>임의경매와 강제경매</h3>
<p>담보를 실행하는 경매를 <em>임의경매</em>라 한다. 근저당권자(주로 은행)가 판결 없이 등기부의 담보권만으로 곧장 법원에 신청하는 경매다. 담보권이라는 강력한 무기를 이미 쥐고 있으니 절차가 간결하다. 시장에 나오는 아파트 경매의 다수가 이 임의경매다.</p>
<p>반면 담보가 없는 채권자가 판결(집행권원)을 받아 채무자의 재산을 붙잡는 경매를 <em>강제경매</em>라 한다. 여기서 "강제"는 당신이 상상하는 폭력적 의미가 아니라, <b>판결의 힘으로 강제집행한다</b>는 뜻이다. 임의경매와 강제경매는 시작점만 다를 뿐, 일단 개시되면 매각·배당 절차는 사실상 똑같이 흘러간다. 입찰자 입장에서 실무적으로 크게 달라지는 것은 없다. 다만 두 용어의 차이를 아는 것은, 나중에 등기부와 사건 서류를 읽을 때 "이 사건은 왜 시작됐는가"를 이해하는 밑바탕이 된다.</p>
<div class="box tip"><span class="box-label">실전 팁</span><p>사건번호 앞의 부호로 종류를 짐작할 수 있다. "타경"으로 시작하는 부동산 경매 사건에서, 신청 원인이 근저당 실행이면 임의경매, 판결에 의한 것이면 강제경매다. 물건명세서와 등기부의 신청채권자·등기 원인을 보면 구별된다. 입찰 판단에서 더 중요한 것은 종류 자체보다 <b>등기부의 권리 순서</b>다. 이는 <span class="xref">(→ 5장)</span>에서 본격적으로 다룬다.</p></div>

<h3>경매와 공매는 다른 시장이다</h3>
<p>초보자가 가장 자주 뒤섞는 두 단어가 경매와 공매다. <em>경매</em>는 <b>법원</b>이 진행한다. 앞서 본 대로 빚을 못 갚은 개인·법인의 담보물이나 재산을 법원이 매각하는 절차다. <em>공매</em>는 주로 <b>한국자산관리공사(캠코)</b>가 운영하는 온라인 시스템 <b>온비드</b>를 통해 진행된다. 세금을 체납해 압류된 재산, 국가·공공기관이 처분하는 재산 등이 공매로 나온다.</p>
<p>흥미로운 점은 <b>같은 아파트 한 채가 경매와 공매에 동시에 나올 수 있다</b>는 것이다. 집주인이 은행 대출을 연체해 근저당권자가 법원 경매를 신청하고, 동시에 세금을 체납해 세무서가 공매를 진행하면, 하나의 물건이 두 시장에 걸린다. 이런 물건은 어느 한쪽에서 먼저 매각되어 소유권이 넘어가면 다른 쪽 절차가 정리되므로, 입찰 전에 반드시 양쪽 진행 상황을 확인해야 한다.</p>
<div class="box warn"><span class="box-label">주의</span><p>가장 흔한 오해가 입찰 방식이다. <em>2026년 현재 법원 부동산 경매는 정해진 날 법정에 직접 출석해 입찰표를 내는 기일입찰이 원칙</em>이다. "인터넷으로 클릭해서 아파트를 낙찰받는다"는 이미지는 공매(온비드)의 전자입찰이지 법원 경매가 아니다. 법원 경매의 전자입찰은 아직 일반화되지 않았다. 이 둘을 혼동하면 입찰일에 법정에 나타나지 못해 기회를 통째로 놓친다. 경매는 "그날, 그 법정에, 몸으로" 간다고 기억하라.</p></div>
<p>이 책은 <b>법원 경매</b>, 그중에서도 아파트에 집중한다. 공매는 권리관계와 절차가 또 다른 세계라, 초보가 두 시장을 동시에 배우려다 길을 잃기 쉽다. 먼저 경매를 몸에 익힌 뒤 공매로 확장하는 편이 안전하다.</p>

<h3>경매에 등장하는 사람들</h3>
<p>경매라는 무대에는 여러 배역이 있다. 이들의 관계를 알면 사건 서류가 훨씬 잘 읽힌다.</p>
<ul>
<li><b>채무자</b> — 빚을 진 사람. 대개 그 아파트의 소유자이기도 하다.</li>
<li><b>소유자</b> — 경매에 부쳐진 집의 등기상 주인. 채무자와 같은 경우가 많지만, 남의 빚을 위해 자기 집을 담보로 내준 <b>물상보증인</b>이면 소유자와 채무자가 다르다.</li>
<li><b>(신청)채권자</b> — 돈을 받을 사람. 경매를 신청한 은행 등이 여기 해당한다. 그 외 다른 채권자들도 배당요구로 참여한다.</li>
<li><b>임차인</b> — 그 집에 세 들어 사는 사람. 임차인의 권리(대항력·우선변제권)가 어떠냐에 따라 물건의 안전성이 크게 갈린다 <span class="xref">(→ 6장)</span>.</li>
<li><b>집행법원과 집행관</b> — 경매를 관장하는 법원, 그리고 현장 조사와 매각 진행을 맡는 집행관.</li>
<li><b>매수인</b> — 낙찰받아 그 집을 사는 사람, 곧 당신이다.</li>
</ul>
<p>그렇다면 낙찰대금은 어디로 갈까. 매각대금에서 먼저 경매 진행에 든 <b>집행비용</b>을 떼고, 남은 돈을 법이 정한 <b>순위</b>에 따라 채권자와 임차인에게 나눠 준다. 그러고도 돈이 남으면 마지막으로 소유자(채무자)에게 돌아간다. 즉 경매는 "채무자의 집이 사라지고 채권자들이 순서대로 돈을 회수하는" 정산의 무대다. 이 순위와 배당의 원리가 결국 <span class="xref">(→ 7장)</span>에서 다룰 권리분석의 핵심이 된다.</p>

<h3>경매에 대한 다섯 가지 오해</h3>
<p>경매를 망설이게 하는 것은 대개 잘못된 소문이다. 하나씩 정직하게 반박한다.</p>
<ul>
<li><b>"위험하다"</b> — 위험은 물건이 아니라 <b>모르고 사는 데</b> 있다. 권리분석을 배우면 위험한 물건과 안전한 물건을 스스로 골라낼 수 있다. 대다수 아파트 경매 물건은 권리관계가 깨끗하다.</li>

<li><b>"큰돈이 있어야 한다"</b> — 입찰에 필요한 즉시 현금은 <em>최저매각가격의 10%</em>인 보증금이다. 잔금은 낙찰 후 약 한 달 안에 치르며, 그 사이 경락잔금대출을 활용할 수 있다 <span class="xref">(→ 20장)</span>.</li>
<li><b>"남의 집을 빼앗는 일"</b> — 경매는 채권자가 정당한 권리를 회수하는 <b>합법적 국가 절차</b>다. 당신은 시장에 나온 물건에 정해진 규칙으로 응찰하는 매수인일 뿐이다.</li>
<li><b>"모두 하자물건이다"</b> — 하자 있는 특수물건도 있지만, 그것을 걸러내는 것이 바로 권리분석이다. 깨끗한 물건만 골라 입찰해도 충분히 기회는 많다.</li>

<p>결국 경매는 위험한 도박이 아니라 <b>배우면 다룰 수 있는 기술</b>이다. 그 기술의 첫 단계가 전체 그림을 보는 것이고, 당신은 방금 그 그림의 윤곽을 그렸다.</p>

<li><b>매각결정기일</b> — 매각기일로부터 <em>1주 이내</em>. 최고가로 응찰한 사람에게 매각을 허가할지 법원이 결정한다.</li>

<li><b>대금(잔금)지급</b> — 매각허가결정이 확정되면 법원이 <em>확정 후 1개월 이내</em>의 날을 잔금 지급기한으로 지정한다. 이날 잔금을 완납하면 <b>그 순간 소유권을 취득</b>한다. 등기를 하기 전이라도 대금 납부만으로 소유자가 된다.</li>
<li><b>배당기일</b> — 대금 납부 후 약 2주에서 1개월 사이에 잡힌다. 법원이 매각대금을 정해진 순위에 따라 채권자·임차인에게 나눠 준다. 이로써 사건이 종결된다.</li>

<p>이 모든 과정을 합치면 개시결정부터 배당까지 <b>통상 6개월에서 1년</b>이 걸린다. 유찰이 반복되면 그 이상으로 늘어난다. 당신이 관심을 두는 시점은 대개 매각기일 몇 주 전이지만, 그 물건이 이미 반년 가까이 절차를 밟아 온 결과물이라는 사실을 알아 두면 서류를 읽는 눈이 달라진다.</p>

<h3>세 개의 날짜가 가진 의미</h3>
<p>초보가 자주 헷갈리는 세 날짜를 구분해 두자.</p>
<ul>

<li><b>매각결정기일</b> — 입찰 후 약 1주 뒤, 법원이 최고가매수인에게 "당신에게 팔겠다"고 도장을 찍는 날. 이날 이후에도 1주간의 항고 기간을 지나야 완전히 확정된다.</li>
<li><b>잔금납부일(대금지급기한)</b> — 확정 후 법원이 지정하는, 잔금을 완납해야 하는 마감일. 이날 돈을 내면 소유권이 넘어온다. 기한을 넘기면 낼 수 있는 방법이 좁아지고, 끝내 못 내면 보증금을 잃고 재매각으로 넘어간다.</li>
</ul>
<p>즉 <b>낙찰이 곧 소유가 아니다</b>. 낙찰(매각기일) → 허가·확정(약 2주) → 잔금 완납(약 1개월 내)이라는 세 관문을 통과해야 비로소 그 집이 당신 것이 된다. 이 시차를 알아야 대출과 자금 계획을 정확히 세울 수 있다.</p>

<h3>유찰과 저감률, 가격이 내려오는 원리</h3>
<p>매각기일에 아무도 입찰하지 않으면 그 회차는 <em>유찰</em>된다. 유찰되면 법원은 다음 회차의 최저매각가격을 일정 비율로 낮춰 다시 매각에 부친다. 이 낮추는 비율이 <em>저감률</em>이다. 저감률은 지역·법원별로 다른데, <b>서울 등은 20%</b>, <b>인천·경기는 30%</b>가 일반적이고, 같은 경기라도 <b>안양지원은 20%</b>처럼 예외가 있다. 정확한 비율은 사건 공고문에서 확인해야 한다.</p>
<p>감정가 5억 원짜리 서울 아파트를 예로 들자. 1회차 최저매각가격은 감정가 그대로 5억 원이다. 한 번 유찰되면 20% 내린 <b>4억 원</b>이 2회차 최저가가 된다. 또 유찰되면 4억 원에서 다시 20% 내린 <b>3억 2,000만 원</b>이 3회차 최저가다. 이렇게 유찰이 쌓일수록 진입 가격이 낮아지지만, 그만큼 물건에 무언가 사연(권리상 하자, 명도 난이도 등)이 있을 가능성도 함께 살펴야 한다. 싼 데는 대개 이유가 있다.</p>
<div class="box tip"><span class="box-label">실전 팁</span><p>입찰 보증금은 감정가가 아니라 <em>그 회차의 최저매각가격의 10%</em>다. 위 예에서 2회차에 입찰한다면 보증금은 4억 원의 10%인 4,000만 원이다. 감정가 기준으로 착각하면 준비 금액이 어긋난다.</p></div>
<p>한 가지 더 구분해 둘 것이 있다. 아무도 입찰하지 않아 값을 낮춰 다시 파는 것을 <em>새매각</em>이라 하고, 낙찰은 됐지만 낙찰자가 잔금을 못 내서 다시 파는 것을 <em>재매각</em>이라 한다. 둘은 완전히 다르다. 새매각은 최저가가 저감되지만, 재매각은 이전 낙찰자의 책임으로 다시 파는 것이라 최저가가 내려가지 않고 오히려 <b>보증금이 20~30%로 올라가는 경우</b>가 많다. 공고문에 "재매각"이라 적혀 있다면 앞선 낙찰자가 무언가에 걸려 잔금을 포기했다는 신호일 수 있으니, 그 물건에 숨은 사정이 없는지 더 꼼꼼히 살펴야 한다.</p>

<p>경매에 나오는 물건은 아파트만이 아니다. 빌라, 오피스텔, 상가, 토지, 지분, 공장까지 온갖 부동산이 시장에 나온다. 그런데 이 책이 유독 아파트에 집중하는 데에는 분명한 이유가 있다. 초보자가 가장 적은 위험으로, 가장 배우기 쉬운 무기를 들고 시작할 수 있는 물건이 바로 아파트이기 때문이다. 이 장은 다른 물건과 비교해 아파트가 왜 초보의 물건인지, 그리고 지금 아파트 경매 시장이 어떤 국면에 있는지를 통계로 읽는 법과 함께 짚는다.</p>

<p>물론 아파트에도 단점은 있다. 인기가 많은 만큼 <b>경쟁이 치열해 낙찰가가 높아지는 경향</b>이 있고, 규제 정책의 직접적인 영향권에 있다. 그러나 초보에게는 "예측 가능성"이 무엇보다 중요하다. 아파트는 실수해도 회복이 상대적으로 쉬운 물건이다.</p>

<h3>시세 파악이 쉽다는 결정적 무기</h3>
<p>경매에서 가장 중요한 능력을 딱 두 가지만 꼽으라면 <b>권리분석</b>과 <b>시세 파악</b>이다. 권리분석은 "이 물건이 안전한가"를, 시세 파악은 "얼마에 사야 남는가"를 답한다. 아파트는 이 두 번째 능력을 압도적으로 쉽게 만들어 준다.</p>
<p>국토교통부 실거래가 공개시스템(rt.molit.go.kr)에 들어가면 같은 단지, 같은 면적의 아파트가 최근 실제로 얼마에 거래됐는지 낱낱이 나온다. KB부동산(kbland.kr)에서는 시세 구간을, 여러 포털에서는 현재 매물 호가를 확인할 수 있다. 이렇게 세 갈래로 교차 확인하면, 당신은 감정가에 휘둘리지 않고 <b>이 물건의 진짜 가치</b>를 스스로 계산할 수 있다.</p>
<div class="box tip"><span class="box-label">실전 팁</span><p>감정가는 조사 시점의 값이라 매각 시점의 시세와 다를 수 있다. 시장이 오르는 국면이라면 감정가가 현재 시세보다 낮아 실제로는 감정가 이상에 낙찰돼도 시세보다 싼 경우가 생기고, 내리는 국면이라면 그 반대다. 그래서 <em>감정가가 아니라 오늘의 실거래가를 기준으로</em> 입찰 상한선을 세워야 한다. 아파트는 이 실거래 데이터가 풍부해 그 계산이 가능하다.</p></div>
<p>권리분석에서 위험을 걸러내고, 시세 파악에서 상한선을 세운다. 이 두 무기를 아파트만큼 쉽게 손에 쥐여 주는 물건은 드물다. 그래서 초보는 아파트로 시작한다.</p>
<p>간단한 예로 감각을 잡아 보자. 같은 단지, 같은 84제곱미터가 최근 실거래가 6억 원, 급매 호가 5억 8,000만 원 선에서 형성돼 있다고 하자. 감정가는 반년 전 조사 기준이라 5억 5,000만 원으로 잡혀 있다. 이때 당신이 세울 입찰 상한선의 기준은 감정가 5억 5,000만 원이 아니라 <b>오늘의 실거래·급매가</b>다. 취득세와 명도·수리 비용, 그리고 "경매로 산 보람"인 안전마진을 빼고 나면, 이를테면 5억 3,000만 원 밑에서 승부를 보겠다는 식으로 상한을 정한다. 이 계산이 가능한 이유는 오직 하나, 아파트라서 오늘의 시세를 숫자로 확인할 수 있기 때문이다. 빌라나 토지였다면 이 첫 줄부터 막힌다.</p>

<h3>낙찰가율 통계 읽는 법</h3>
<p>시장의 온도를 재는 대표 지표가 <em>낙찰가율</em>이다. 낙찰가율은 <b>낙찰가를 감정가로 나눈 비율</b>이다. 낙찰가율이 100%라면 감정가와 같은 값에, 90%라면 감정가의 90%에 팔렸다는 뜻이다. 이 숫자가 높아지면 시장이 과열됐다는, 낮아지면 냉각됐다는 신호로 읽는다.</p>
<p>다만 낙찰가율만 봐서는 절반만 아는 것이다. 함께 봐야 할 짝이 <b>평균 응찰자 수</b>다. 한 물건에 몇 명이 달려들었는지를 보면 경쟁의 실제 열기를 알 수 있다. 응찰자가 줄면서 낙찰가율이 정체하거나 꺾이면, 과열이 식어 가는 조짐으로 해석한다.</p>

<h3>말소기준이 될 수 있는 권리</h3>
<p>등기부의 시간 한 줄에서 <b>가장 먼저 등기된 것</b> 중, 아래 목록에 드는 권리가 말소기준권리가 된다.</p>
<ul>
<li>근저당권·저당권</li>
<li>압류·가압류</li>
<li>담보가등기(순위보전 목적의 소유권이전청구권 가등기는 <em>제외</em>)</li>
<li>경매개시결정등기</li>
<li>전부를 대상으로 <b>배당요구(또는 스스로 경매신청)한 선순위 전세권</b></li>
</ul>
<p>반대로, 말소기준이 <em>될 수 없는</em> 권리도 기억해야 한다. 배당요구하지 않은 전세권, 소유권이전청구권 보전가등기, 소유권을 다투는 가처분, 대항력 있는 임차권 등은 기준선이 되지 못하고, 오히려 기준선보다 앞서 있으면 낙찰자가 인수한다.</p>
<div class="box law"><span class="box-label">법령</span><p>"말소기준권리"라는 표현은 법전에 없는 <b>실무·강학 용어</b>다. 근거 조문은 민사집행법 제91조(인수주의와 잉여주의)로, 매각으로 소멸되는 권리와 매수인이 인수하는 권리를 정하는 규정이다. 시험이 아니라 실전에서 통하는 말이니 용어 자체보다 <em>원리</em>를 익혀라.</p></div>

<h3>단 하나의 원칙: 앞서면 인수, 뒤면 소멸</h3>
<p>원칙은 이게 전부다.</p>
<div class="callout"><p>말소기준권리보다 <b>먼저</b> 등기된 권리 → <em>낙찰자 인수</em>.<br>말소기준권리 <b>자신과 그 이후</b>에 등기된 권리 → <em>소멸</em>.</p></div>
<p>말소기준 자신은 배당을 받고 사라지는 것이 보통이다. 선순위 전세권도 스스로 배당요구를 하면 기준선이 되어 소멸한다. 반대로 배당요구를 하지 않은 선순위 전세권은 기준선이 되지 못하고 그 위에 남아 인수 대상이 된다.</p>
<p>주의할 점 하나. 이 원칙은 <b>등기된 권리</b>의 인수·소멸을 가른다. 그런데 임차인의 <b>대항력</b>은 등기가 아니라 전입신고와 점유로 생긴다 <span class="xref">(→ 7장)</span>. 즉 말소기준보다 앞서 대항력을 갖춘 임차인은 등기부에 근저당처럼 찍혀 있지 않아도 인수 대상이 될 수 있다. 그래서 등기부만으로 끝내면 안 되고, 전입세대확인서와 매각물건명세서를 반드시 교차해야 한다 <span class="xref">(→ 9장)</span>.</p>

<h3>기준선과 상관없이 인수되는 권리</h3>
<p>말소기준의 원칙에는 예외가 있다. 아래 권리들은 말소기준보다 <em>뒤</em>에 있어도, 심지어 등기부에 안 보여도 낙찰자가 떠안는다. 순서 논리로 안심하다 이 예외에 걸리면 손해가 크다.</p>
<ul>
<li><b>선순위 대항력 임차인</b>의 미회수 보증금 — 등기 아닌 전입·점유로 판단 <span class="xref">(→ 7장)</span>.</li>
<li><b>유치권</b> — 등기부에 없지만 점유로 성립. 다만 경매개시등기 후 취득한 점유는 낙찰자에게 대항 못 한다(대법원 2005다22688) <span class="xref">(→ 특수물건 편)</span>.</li>
<li><b>법정지상권·분묘기지권</b> — 토지 위 건물·묘의 존속을 인정하는 권리로, 순위와 무관.</li>
<li>매각공고의 <b>특별매각조건</b>으로 "인수"라 명시된 것 — 토지별도등기 인수, 대지권미등기 등.</li>
</ul>
<p>그래서 완전한 판정은 두 겹이다. 먼저 등기부에서 말소기준선을 그어 <em>등기된</em> 권리의 인수·소멸을 정하고, 그다음 등기 밖의 인수 권리(임차인·유치권·특별매각조건)를 매각물건명세서로 다시 훑는다. 앞의 절반만 하고 입찰하면 딱 이 예외에서 무너진다.</p>

<p>등기부를 다 읽고 말소기준선까지 그었는데도 뒤통수를 맞는 자리가 하나 있다. 바로 <b>임차인</b>이다. 임차인의 힘은 등기부에 근저당처럼 또렷이 찍히지 않는다. 전입신고와 점유라는, 등기소 밖의 사실로 생긴다. 그래서 초보가 가장 크게, 가장 자주 돈을 잃는 곳이 여기다. 이 장에서는 대항력과 우선변제권이 각각 언제 생기는지, 같은 날 근저당이라는 함정, 배당요구 종기라는 마감선, 그리고 <em>선순위 대항력 임차인이 배당요구를 안 했을 때</em> 벌어지는 최악의 시나리오를 사례로 못 박는다.</p>

<h3>대항력과 우선변제권 — 언제, 무엇이 생기나</h3>
<p>임차인의 두 무기를 분리해서 이해해야 한다.</p>
<ul>
<li><b>대항력</b> = 점유(주택 인도) + 전입신고. 효력은 <em>전입신고 다음 날 0시</em>부터 발생한다. 대항력이 있으면 집이 경매로 팔려 주인이 바뀌어도 임차인은 새 주인(낙찰자)에게 "계약 기간 살겠다, 못 받은 보증금 내놓으라"고 주장할 수 있다.</li>
<li><b>우선변제권</b> = 대항요건(점유+전입) + <b>확정일자</b>. 이게 있으면 경매 배당에서 후순위 채권자보다 먼저 보증금을 배당받는다.</li>
</ul>
<p>둘은 별개다. 전입만 하고 확정일자를 안 받으면 <em>대항력은 있지만 우선변제권은 없다</em>. 반대로 확정일자만 있고 점유·전입이 없으면 아무 힘이 없다. 이 조합의 차이가 사건의 승패를 가른다.</p>

<h4>함정 1 — 같은 날 근저당이 이긴다</h4>
<p>임차인이 3월 15일에 전입신고를 했다. 같은 날 은행도 근저당을 설정했다. 누가 앞설까? <b>근저당이다.</b> 근저당은 접수한 그날 효력이 생기지만, 임차인의 대항력은 <em>전입 다음 날 0시</em>에야 생기기 때문이다. 하루 차이가 아니라 '같은 날'이라도 임차인이 진다. 그래서 등기부에서 최선순위 근저당 설정일과 임차인 전입일이 붙어 있으면, 하루 단위로 신경을 곤두세워야 한다.</p>

<div class="callout"><p>임차인이 <b>말소기준권리보다 앞서</b> 대항력을 갖췄고(선순위 대항력),<br>그런데 <b>배당요구를 하지 않았다면</b> →<br>임차인은 경매에서 한 푼도 배당받지 않은 채, 못 받은 보증금 전액을 <em>낙찰자에게</em> 청구한다. 낙찰자가 인수한다.</p></div>

<p>낙찰가를 얼마 쓸지, 이 물건이 안전한지는 결국 "누가 얼마를 배당받는가"로 귀결된다. 특히 <b>임차인이 배당으로 보증금을 다 회수하는가</b>는 인수 위험뿐 아니라 낙찰 후 명도의 난이도까지 좌우한다. 돈을 다 돌려받고 나가는 세입자와, 한 푼도 못 받고 쫓겨나는 세입자는 이삿짐을 빼는 태도부터 다르다. 이 장에서는 배당의 순위를 표로 세우고, 당해세라는 함정을 짚은 뒤, 가상의 낙찰 사건 하나로 배당표를 직접 짜본다.</p>

<h3>배당 순위표 — 위에서부터 채운다</h3>

<h3>끝자리 전략 — 미신과 데이터 사이</h3>

  <li><b>매각기일(낙찰일)</b> — 최고가매수신고인으로 결정. 이때 낸 매수신청보증금(최저매각가격의 <em>10%</em>)이 잠금장치처럼 걸린다. <span class="xref">(→ 9장)</span></li>
  <li><b>매각결정기일</b> — 매각기일부터 <em>1주 이내</em>에 법원이 매각을 허가할지 결정한다(민사집행법 §109). 특별한 하자가 없으면 매각허가결정이 난다.</li>
  <li><b>즉시항고기간</b> — 매각허가결정 고지일부터 <em>1주 이내</em>(§130). 이해관계인이 항고하지 않으면 결정이 확정된다. 항고하려면 매각대금의 10%를 공탁해야 하므로 남발되지는 않는다.</li>
  <li><b>매각허가결정 확정</b> — 항고 없이 1주가 지나면 확정. 여기서부터 당신의 진짜 카운트다운이 시작된다.</li>
  <li><b>대금지급기한</b> — 법원이 확정 후 <em>1개월 이내</em>의 날을 잡아 통지한다(§142). 이 날까지 잔금(낙찰가에서 이미 낸 보증금을 뺀 나머지) 전액을 내야 한다.</li>
  <li><b>배당기일</b> — 대금 납부 후 약 2주에서 1개월 뒤, 법원이 채권자들에게 배당한다.</li>
</ol>
<p>즉, 낙찰일로부터 잔금까지는 대략 6주 안팎이다. 매각결정 1주, 항고기간 1주, 그리고 대금지급기한까지 최대 1개월. 이 6주를 대출과 자금 스케줄로 역산해 두지 않으면 뒤에서 쫓기게 된다. 특히 <em>대금지급기한은 "1개월 이내의 어느 날"</em>이지 무조건 30일째가 아니다. 통지서에 찍힌 날짜를 반드시 확인하라.</p>
<div class="box tip"><span class="box-label">실전 팁</span><p>대금은 지급기한 "안"이면 아무 날이나 낼 수 있다. 대출 금리와 잔금일을 맞추기 위해 기한보다 며칠 앞당겨 내는 것도 가능하다. 반대로 기한을 하루라도 넘기면 뒤에서 설명할 재매각·보증금 몰수 절차로 직행한다.</p></div>

<h3>경락잔금대출 — 낙찰가가 아니라 "규제"가 한도를 정한다</h3>
<p>대부분의 낙찰자는 잔금을 경락잔금대출로 메운다. 문제는 이 대출 한도가 당신 생각보다 훨씬 작을 수 있다는 것이다. 한도는 네 가지 중 <em>가장 작은 값</em>으로 정해진다. LTV 한도, 방공제 차감액, DSR 한도, 그리고 금액 절대상한이다.</p>
<div class="box warn"><span class="box-label">주의</span><p>아래 수치는 <b>집필 시점(2026년 7월) 기준</b>이며, 부동산 대출 규제는 대책 발표마다 바뀐다. 특히 규제지역·LTV·DSR은 반기마다 갱신되므로 입찰 전 은행과 최신 조건을 반드시 재확인하라.</p></div>
<h4>규제지역이라면 LTV 40%가 상한</h4>
<p>2025년 <em>10·15 대책</em>으로 규제 범위가 크게 넓어졌다. <b>서울 25개 자치구 전역</b>과 <b>경기 12곳</b>(과천, 광명, 성남 분당·수정·중원, 수원 영통·장안·팔달, 안양 동안, 용인 수지, 의왕, 하남)이 조정대상지역·투기과열지구·토지거래허가구역 3중 규제로 묶였다. 이 지역 무주택자의 주택담보대출 LTV는 <em>40%</em>다. 게다가 금액 절대상한이 있어, 시가 15억 원 이하 주택은 대출이 <em>6억 원</em>을 넘지 못한다(15~25억은 4억, 25억 초과는 2억).</p>
<p>예를 들어 서울에서 10억 원에 낙찰받았다면, LTV 40%로는 4억 원까지 계산되지만 절대상한 6억 원 안이므로 4억 원이 한도다. 나머지 6억 원은 현금으로 준비해야 한다. 규제지역이 아닌 수도권은 통상 50~70%, 지방 비규제는 70% 안팎까지 나오기도 한다.</p>
<h4>방공제 — 보이지 않게 깎이는 돈</h4>
<p>경락잔금대출에는 <em>방공제</em>라는 함정이 하나 더 있다. 은행은 혹시 모를 소액임차인 최우선변제금만큼을 한도에서 미리 뺀다. 서울은 <em>5,500만 원</em>이다<span class="xref">(→ 6장)</span>. 즉 LTV로 4억 원이 계산돼도 방 하나만큼 5,500만 원을 빼고 3억 4,500만 원만 나올 수 있다. MCI·MCG 같은 보증보험을 붙이면 방공제 없이 실행되기도 하니, 대출 상담 때 "방공제를 뺄 방법이 있는지"를 반드시 물어라.</p>
<h4>DSR과 다주택 봉쇄</h4>
<p>총부채원리금상환비율(DSR) 40% 원칙에 더해, 2025년 7월부터 <em>스트레스 DSR 3단계</em>가 적용된다. 규제지역은 스트레스 금리 3.0%, 만기 30년 제한이 걸려 실제 대출 가능액이 더 줄어든다. 무엇보다 <b>다주택자는 규제지역에서 사실상 추가 취득 대출이 봉쇄</b>됐다. "경매로 한 채 더" 전략을 세웠다면, 본인 명의로 대출이 나오는지부터 확인하는 것이 순서다.</p>
<div class="callout">낙찰가를 정할 때 "이 물건이 싸냐"만 보지 말고 "이 물건에 내 대출이 얼마나 붙느냐"를 함께 계산하라. 규제지역·방공제·DSR을 넣고 역산한 실제 조달 가능액이, 당신이 써도 되는 입찰가의 진짜 천장이다.</div>

<div class="box case"><span class="box-label">사례</span><p>재구성한 예시다. 무주택 직장인 A는 서울 외곽의 전용 59㎡ 아파트를 7억 2,000만 원에 낙찰받았다. 그는 "LTV 40%면 2억 8,800만 원, 신용대출 조금 보태면 된다"고 낙관했다. 그러나 실제 상담에서 방공제 5,500만 원이 빠지고, 기존 자동차 할부와 신용대출 때문에 스트레스 DSR을 적용하니 승인액이 2억 원대 초반으로 쪼그라들었다. 부족분 8,000만 원을 한 달 안에 마련하지 못한 A는 대금지급기한을 넘겼고, 결국 낸 보증금 약 6,500만 원(최저가의 10%)을 몰수당했다. 물건은 재매각에 부쳐졌다. 그가 잃은 것은 6,500만 원과 기회비용, 그리고 자신감이었다. 교훈은 단순하다. <em>대출 승인은 낙찰 전에 가승인으로 확인하고, 방공제와 DSR까지 넣어 계산하라.</em></p></div>

<h3>잔금 미납의 대가 — 재매각과 보증금 몰수</h3>
<p>대금지급기한까지 잔금을 못 내면 어떻게 될까. 법원은 그 물건을 <b>재매각</b>에 부친다. 이때 당신이 낸 매수신청보증금은 돌려받지 못하고 배당재원에 편입된다. 재매각에서는 매수신청보증금이 통상 20~30%로 높아진다. 즉 미납은 나 하나 손해로 끝나지 않고, 다음 입찰자들의 문턱까지 높여 놓는다. "잔금이 빠듯할 것 같다"는 감이 오면, 무리한 입찰가부터 다시 생각하라. 경매에서 가장 비싼 실수는 못 낼 값을 써내는 것이다.</p>

<h3>잔금 전에 반드시 점검할 자기자본</h3>
<p>대출이 한도만큼 다 나온다고 가정하면 안 된다. 낙찰가에서 대출 승인액을 뺀 나머지가 당신이 현금으로 마련해야 할 <em>자기자본</em>이고, 여기에 세금과 부대비용이 얹힌다. 잔금 계획을 짤 때는 최소한 다음을 한 줄씩 적어 합산하라.</p>
<ul class="check">
  <li>낙찰가에서 이미 낸 매수신청보증금(최저가의 10%)을 뺀 잔금</li>
  <li>취득세와 지방교육세, 85㎡ 초과라면 농특세까지</li>
  <li>국민주택채권 매입비(즉시 매도 시 할인손실만 실부담), 등기신청수수료, 법무사 보수(셀프면 생략)</li>
  <li>명도에 쓸 이사비와 예비비, 최소 한두 달치 대출이자</li>

<p>이 합계가 당신이 실제로 동원할 수 있는 현금 안에 들어와야 한다. 대출은 "가능한 최대"가 아니라 "확정 승인액"으로 잡아라. 은행 지점마다 경락잔금대출 취급 조건이 다르니, 입찰 전에 두세 곳에서 가승인을 받아 비교하는 것이 정석이다.</p>

<h3>소유권이전등기 촉탁 — 잔금과 함께 끝내는 셀프등기</h3>
<p>잔금을 내는 것과 등기를 넘겨받는 것은 별개의 절차처럼 보이지만, 경매에서는 <em>법원 촉탁</em>으로 한 번에 처리된다. 당신이 대금을 완납하면 법원이 등기소에 "이 사람 앞으로 소유권을 이전하고, 말소될 권리들을 지워 달라"고 촉탁해 준다. 법무사에게 맡기면 편하지만 수십만 원의 보수가 든다. 흐름만 알면 셀프등기도 어렵지 않다. 순서는 이렇다.</p>
<ol class="steps">
  <li><b>취득세 납부</b> — 낙찰은 유상승계취득이라 매매와 세율이 같다. 6억 원 이하 1%, 6~9억 원 1~3% 누진, 9억 원 초과 3%. 취득일(잔금완납일)로부터 <em>60일 이내</em> 신고·납부이지만, 등기 촉탁을 걸려면 잔금 낼 때 미리 내는 것이 실무다. 전용 <em>85㎡ 초과</em>면 농특세가 붙고, 85㎡ 이하 국민주택규모는 농특세가 비과세다. <span class="xref">(→ 부록 D)</span></li>
  <li><b>서류 준비</b> — 취득세 영수필확인서, 국민주택채권 매입 영수증, 등기신청수수료, 부동산 목록, 주민등록초본, 등기촉탁신청서 등을 갖춘다.</li>
  <li><b>말소할 권리 목록 작성</b> — 말소기준권리 이하로 소멸하는 근저당·가압류 등을 촉탁으로 함께 지운다<span class="xref">(→ 5장)</span>.</li>

</ol>

</ol>
<div class="box tip"><span class="box-label">실전 팁</span><p>인도명령 신청은 <b>강제집행이 목적이 아니라 협상 카드다.</b> 대부분은 인도명령 결정문이 점유자에게 송달되는 것만으로 "아, 이 사람 진짜 하는구나" 하고 태도가 바뀐다. 그래서 실전에서는 <em>대화와 인도명령 신청을 병행</em>하는 경우가 많다. 부드럽게 말하되, 절차는 늦추지 않는 것이다.</p></div>

<h3>이사비 협상의 심리학 — 강제집행 비용이 당신의 기준선</h3>
<p>점유자는 흔히 이사비를 요구한다. 법적으로 낙찰자가 이사비를 줄 의무는 없다. 그런데도 실전에서 이사비를 주는 이유는 인정 때문이 아니라 <em>계산</em> 때문이다. 강제집행까지 가면 집행비용(노무비·보관비 등)이 물건에 따라 수십만 원에서 수백만 원까지 들고, 그 몇 달 동안 당신은 이자를 내면서 집을 쓰지도 못한다. 이 "강제집행에 드는 총비용"이 당신이 지불할 이사비의 <b>상한선</b>이다.</p>
<p>협상의 원칙은 세 가지다. 첫째, <b>돈이 아니라 날짜를 먼저 합의</b>하라. "얼마 드릴까"가 아니라 "언제 비워 주실 수 있나"가 먼저다. 둘째, <b>이사비는 인도와 동시에</b>, 즉 짐을 다 빼고 열쇠를 넘겨받는 그날 지급한다고 못 박아라. 미리 주면 약속이 흐려진다. 셋째, 과도한 요구에는 <b>대안의 비용을 조용히 보여줘라.</b> "그 금액이면 차라리 강제집행을 하겠다. 그 경우 집행비용과 그동안의 점유 사용료를 귀하께 청구하게 된다"고, 위협이 아니라 사실로 전한다.</p>
<div class="callout">이사비는 자비가 아니라 시간을 사는 값이다. 강제집행에 500만 원과 넉 달이 든다면, 200만 원에 2주 만에 합의하는 편이 거의 언제나 이득이다. 감정을 빼고 숫자로 판단하라.</div>

<h3>점유자 유형별 대응 — 상대가 누구냐에 따라 카드가 다르다</h3>
<h4>전 소유자(채무자)</h4>
<p>가장 절박하고, 그래서 감정적일 수 있다. 이들에게는 배당받을 돈이 대개 없으니 지렛대가 없다. 인도명령 대상이 명확하므로 절차를 진행하되, 이사비로 퇴로를 열어 주는 것이 빠르다. 자존심을 건드리지 말고 실무적으로 대하라.</p>
<h4>배당받는 임차인 — 명도확인서라는 지렛대</h4>
<p>배당을 받는 임차인은 당신에게 가장 다루기 쉬운 상대다. 이들은 법원에서 배당금을 받으려면 <em>낙찰자가 발급한 명도확인서와 인감증명서</em>를 제출해야 하기 때문이다. 즉 "집을 비워 줘야 배당금을 받는" 구조다. 명도확인서는 당신의 강력한 카드다. <b>집을 실제로 비운 것을 확인한 뒤에</b> 발급하는 것이 원칙이다. 순서가 뒤바뀌면 빈손이 될 수 있다.</p>
<h4>배당을 못 받는 임차인</h4>
<p>말소기준권리보다 늦어 배당이 없고 대항력도 없는 임차인은 사실상 전 소유자와 비슷한 위치다. 지렛대가 없으니 대화와 이사비, 그리고 인도명령으로 간다. 다만 이들은 억울함이 큰 경우가 많아, 정보(왜 배당이 안 되는지, 앞으로 무엇을 할 수 있는지)를 차분히 알려 주는 것이 협상을 부드럽게 한다.</p>
<h4>대항력 있는 임차인은 명도 대상이 아니다</h4>
<p>여기서 결정적 구분. 말소기준권리보다 앞선 <b>대항력 있는 임차인</b>은 인도명령 대상이 아니다<span class="xref">(→ 17장)</span>. 그의 보증금을 당신이 인수해야 할 수도 있으므로, 명도가 아니라 보증금 정산과 재계약의 문제로 접근해야 한다. 이 구분을 낙찰 전 권리분석에서 이미 끝내 두었어야 한다<span class="xref">(→ 7장)</span>.</p>
<h4>무단점유자</h4>
<p>아무 권원 없이 들어와 있는 사람이라면 점유이전금지가처분과 인도명령·강제집행으로 단호하게 처리한다. 다만 점유자가 계속 바뀔 우려가 있을 때는 가처분을 먼저 걸어 대상을 고정하는 것이 안전하다.</p>

<h4>대화의 세 가지 원칙</h4>
<p>상대가 누구든 첫 대화의 태도가 명도 전체의 속도를 정한다. 세 가지만 지켜라. 첫째, <b>내가 왜 왔는지를 분명히</b> 밝히되 상대를 몰아세우지 않는다. "쫓아내러 온 사람"이 아니라 "일정을 함께 정하러 온 새 소유자"로 자신을 소개하라. 둘째, <b>약속은 반드시 문서로</b> 남긴다. 구두 합의는 뒤집히기 쉬우니 날짜·이사비·조건을 간단한 확인서나 문자로라도 남겨라. 셋째, <b>공과금과 관리비의 정산 책임을 미리 못 박는다.</b> 점유자가 쓰던 기간의 전기·수도·가스와 전유부분 관리비는 점유자 몫임을 확인해 두어야, 인도일에 실랑이가 없다. 승계되는 것은 공용부분 관리비 원금뿐이라는 점도 기억하라<span class="xref">(→ 12장)</span>.</p>

<div class="box case"><span class="box-label">사례</span><p>재구성한 예시다. 투자자 B는 인천의 전용 84㎡ 아파트를 낙찰받았다. 점유자는 배당을 한 푼도 못 받는 전 소유자였다. 첫 방문에서 그는 문을 열어 주지 않았다. 전화도 받지 않았다. B는 대화를 시도하는 동시에 인도명령을 신청했고, 결정문이 송달됐는데도 반응이 없었다. 내용증명을 보내고, 계고(집행 예고) 절차를 밟았다. 그사이에도 B는 "이사비 200만 원을 드릴 테니 이달 말까지만 비워 달라"는 제안을 문틈으로, 문자로 계속 남겼다. 점유자는 침묵으로 버텼다. 결국 낙찰 후 약 4개월 만에 강제집행이 집행됐다. 집행 당일 노무비와 보관비로 300만 원 넘게 들었고, 그동안의 대출이자까지 치면 손실은 더 컸다. B의 회고는 이렇다. "차라리 첫 달에 이사비를 300만 원 제시했더라면 더 쌌을 것이다. 하지만 상대가 대화 자체를 거부하면 방법이 없다. 그래서 대화와 절차를 <em>처음부터 동시에</em> 돌려야 한다." 강제집행은 최후의 수단이지만, 그 수단을 준비해 두는 것 자체가 협상력이다.</p></div>

<div class="box scen"><span class="box-label">시나리오</span>
<p>배당받는 임차인과의 첫 만남부터 명도확인서 교부까지, 실제 대화의 흐름을 따라가 보자.</p>
<p><b>1. 첫 방문(정중한 통보)</b> — "안녕하세요, 이번에 이 집을 낙찰받은 사람입니다. 놀라셨죠. 어려운 상황인 거 압니다. 다만 저도 잔금과 대출 일정이 있어서요. 언제쯤 이사가 가능하실지 같이 상의드리려 왔습니다."</p>
<p><b>2. 상대의 사정 듣기</b> — 임차인: "배당금이 나와야 이사 갈 돈이 되는데요." → 당신: "네, 그래서 말씀드리는데, 배당금을 받으시려면 제가 드리는 <em>명도확인서</em>가 필요합니다. 집을 비우신 걸 제가 확인하면 바로 인감 붙여 드릴게요. 서로 맞물려 있으니 날짜만 정하면 됩니다."</p>
<p><b>3. 날짜와 조건 합의</b> — "다음 달 15일까지 짐 빼시는 걸로 하고, 그날 명도확인서 드리겠습니다. 이사 정리 비용으로 100만 원 도와드릴게요. 짐 다 빼시고 열쇠 주시는 날 함께 드리겠습니다."</p>
<p><b>4. 인도 당일</b> — 집이 비었는지 직접 확인(짐·쓰레기 잔류 여부, 관리비 정산). 이상 없으면 그 자리에서 명도확인서와 인감증명서를 건네고, 약속한 이사비를 지급하고, 열쇠를 받는다.</p>
<p><b>5. 마무리</b> — 관리사무소에 소유자 변경을 알리고, 도어록 비밀번호를 즉시 바꾼다. 명도 완료.</p>
</div>

<p>명도가 대화로 풀리지 않을 때, 낙찰자에게 주어진 가장 강력한 도구가 <em>인도명령</em>이다. 소송 없이, 비교적 빠르게, 점유자를 내보낼 수 있는 법적 근거다. 하지만 이 도구는 아무에게나 쓸 수 있는 만능열쇠가 아니다. 대상이 정해져 있고, 기한이 있으며, 잘못 겨누면 몇 배의 시간이 드는 명도소송으로 밀려난다. 이 장은 인도명령을 언제·누구에게 쓸 수 있는지, 그리고 강제집행이 실제로 어떻게 진행되는지를 정확히 짚는다.</p>

<h3>인도명령이란 무엇인가 — 소송 없이 얻는 집행권원</h3>
<p>원래 남의 점유를 강제로 풀려면 명도소송이라는 긴 재판을 거쳐야 한다. 몇 달, 길면 1년 이상이 걸린다. 그런데 경매 낙찰자에게는 예외가 있다. 민사집행법 §136은, 대금을 낸 낙찰자가 <b>대금 납부 후 6개월 이내</b>에 신청하면 법원이 간단한 심리로 <em>인도명령</em>을 내려 주도록 하고 있다. 이 결정문이 곧 강제집행을 할 수 있는 권원이 된다. 소송을 건너뛰게 해 주는, 경매 낙찰자만의 특권이다.</p>
<div class="box law"><span class="box-label">법령</span><p>민사집행법 §136(부동산의 인도명령): 매수인은 대금을 낸 뒤 <b>6개월 이내</b>에, 채무자·소유자 또는 부동산 점유자에게 부동산을 매수인에게 인도하도록 법원에 신청할 수 있다. 다만 점유자가 매수인에게 <em>대항할 수 있는 권원</em>에 의해 점유하고 있는 경우는 제외한다.</p></div>
<div class="box warn"><span class="box-label">주의</span><p><b>6개월</b>이라는 기한을 놓치지 마라. 대금 납부 후 6개월이 지나면 인도명령을 신청할 수 없고, 그때부터는 정식 명도소송으로 가야 한다. 명도가 늘어질 조짐이 보이면, 협상 중이더라도 인도명령은 기한 안에 미리 신청해 결정을 받아 두는 것이 안전하다.</p></div>

<h3>인도명령이 되는 사람, 안 되는 사람</h3>
<p>인도명령의 성패는 "이 점유자가 대상이 되느냐"에 달려 있다. 이 구분은 낙찰 전 권리분석과 정확히 맞물린다<span class="xref">(→ 7장)</span>.</p>

<p>핵심은 <em>대항할 수 있는 권원</em>의 유무다. 말소기준권리보다 앞선 대항력 있는 임차인, 그리고 진정한 유치권자는 낙찰자에게 맞설 정당한 권리가 있으므로 인도명령이 통하지 않는다. 이들과 다투려면 명도소송을 걸어야 하고, 시간과 비용이 크게 늘어난다. 그래서 이런 물건은 애초에 입찰가에 그 위험을 반영하거나 피하는 것이 정석이다.</p>
<div class="box tip"><span class="box-label">실전 팁</span><p>유치권은 주장만 있고 실체가 없는 경우가 많다. 특히 <b>경매개시결정등기(압류) 이후에 점유를 취득한 유치권은 매수인에게 대항하지 못한다</b>(대법원 2005다22688). 유치권 신고가 붙은 물건이라도, 점유 취득 시점과 견련성을 따져 보면 무너지는 경우가 적지 않다. 다만 이 판단은 신중을 요하니 자신 없으면 전문가의 검토를 받아라.</p></div>

<h3>강제집행 — 결정문에서 강제인도까지</h3>
<p>인도명령 결정을 받고도 점유자가 나가지 않으면, 마지막으로 강제집행을 신청한다. 흐름은 다음과 같다.</p>
<ol class="steps">

  <li><b>강제집행 신청</b> — 결정문(집행문 포함)과 송달증명을 갖춰 집행관실에 강제집행을 신청한다.</li>
  <li><b>계고</b> — 집행관이 현장에 나가 "언제까지 자진 인도하지 않으면 강제로 집행하겠다"고 예고한다. 이 단계에서 점유자가 마음을 바꿔 협의로 끝나는 일이 흔하다.</li>
  <li><b>강제인도(본집행)</b> — 그래도 버티면 집행관이 노무 인력을 동원해 짐을 들어내고 집을 비운다. 짐은 지정 장소에 보관하며, 보관·운반 비용이 든다.</li>

<p>실무에서 강제집행은 예납금을 내는 것으로 시작된다. 집행관실이 노무 인원과 차량을 산정해 예상 비용을 미리 받고, 집행 뒤 정산한다. 짐을 실어 낸 뒤 점유자가 찾아가지 않으면 유체동산 경매 등 별도 절차로 처분하게 되어 시간이 더 든다. 즉 강제집행은 "결정문만 있으면 하루면 끝나는 일"이 아니라, <em>비용을 선납하고 몇 주에 걸쳐 진행되는 절차</em>다. 이 현실적 부담을 알면, 앞 장에서 강조한 이사비 협상이 왜 대개 더 합리적인지 다시 이해된다<span class="xref">(→ 16장)</span>.</p>

<h3>점유이전금지가처분이 필요한 순간</h3>

<p>임대로 나갈 때 놓치기 쉬운 두 가지가 있다. 하나는 <b>깡통전세 리스크</b>다. 전세보증금을 시세에 바짝 붙여 받으면 당장 실투자금은 줄지만, 시세가 조금만 빠져도 역전세에 몰린다. 2024년 2분기에는 전국 아파트에서 전세가율 80%가 넘는 의심거래가 25.9%에 달했다. 세를 놓을 땐 보증금을 시세의 안전한 비율 안으로 잡고, 임차인의 보증보험 가입이 수월한 수준인지도 함께 보라. 다른 하나는 <b>임차인의 대항력이 곧 당신의 미래 제약</b>이 된다는 점이다. 새로 들인 임차인은 전입·확정일자로 우선변제권을 갖추므로, 나중에 이 집을 담보로 추가 대출을 받거나 매도할 때 그 권리를 감안해야 한다.</p>

<p>출구전략은 "누구 이름으로 사느냐"에서 이미 절반이 결정된다. 장기 보유를 노리는 아파트라면 대체로 <b>개인, 특히 부부공동명의</b>가 세제상 유리하다. 양도차익을 둘로 나눠 누진세율을 낮추고, 종합부동산세도 각자 공제를 받기 때문이다. 반면 <b>법인</b>은 취득세가 12%로 고정되고 종부세 공제가 없으며 양도 시 추가 20%p가 붙어, 아파트 장기 투자에는 대체로 불리하다(단기매매나 비주택은 별도 검토). 다만 배우자 공동명의로 전환하는 것도 증여세와 이월과세(10년) 문제가 따르니, 처음부터 명의를 설계해 두는 것이 낫다. 세부 판단은 세무 전문가와 상의하라. <span class="xref">(→ 부록 D)</span></p>

<div class="callout">반대로, 실거주 1주택으로 접근한다면 이야기가 달라진다. <b>1세대 1주택 비과세</b>는 양도가 12억 원 이하, 2년 보유(취득 당시 규제지역이면 2년 거주 추가) 요건을 갖추면 적용된다. 장기보유특별공제도 최대 80%까지 받을 수 있다. 규제지역 경매의 이점(토지거래허가 불필요, 주담대 미이용 시 실거주의무 면제)과 맞물리면, 실거주 목적의 낙찰은 세제상 가장 안전한 출구가 된다.</div>
<h3>팔 때의 실무 — 중개와 타이밍</h3>
<p>매도를 택했다면 매물을 어떻게 내놓느냐가 회수 속도를 좌우한다. 첫째, <b>같은 단지를 많이 거래해 본 인근 중개사</b> 두세 곳에 동시에 내놓아라. 그 단지의 실수요층과 적정 호가를 가장 잘 아는 사람이 가장 빨리 팔아 준다. 둘째, <b>호가는 최근 실거래가에 근거</b>해 정하라. 국토부 실거래가와 KB시세를 확인하고, 지나친 욕심은 매물을 시장에 오래 묶어 둘 뿐이다. 셋째, <b>보유기간의 세금 분기점을 달력에 표시</b>하라. 1년, 2년이 되는 시점에서 양도세율이 크게 떨어지므로, 며칠 차이로 수천만 원이 갈릴 수 있다. 매도 시점은 감이 아니라 세율표를 보고 정하는 것이다.</p>
<p>결국 출구전략은 수리비 몇백만 원의 문제가 아니라 세금 수천만 원의 문제다. <b>낙찰받기 전에 출구를 정하고, 그 출구의 세후 수익으로 입찰가를 역산하라.</b> 그것이 이 책 전체를 관통하는 마지막 원칙이다.</p>

<h3>양도세 절세 포인트</h3>
<p>사는 것만큼 <b>파는 타이밍</b>이 중요하다. 보유기간과 주택 수가 세율을 결정한다.</p>
<ul>
<li><b>단기 보유는 독</b> — 1년 미만 70%, 1~2년 60%(지방소득세 10% 별도 → 1년 미만 실효 약 77%). 급하게 되팔면 차익 대부분이 세금이다. 최소 <b>2년 이상</b> 보유해 기본세율(6~45%) 구간으로 내려야 한다.</li>
<li><b>다주택 중과 부활 ⚠️</b> — <b>2026-05-10부터</b> 다주택 중과가 재시행됐다(4년 유예 종료). 조정지역 2주택 +20%p, 3주택+ +30%p로 지방세 포함 실효 최고 약 82.5%까지 오른다. 단기세율과 중과세율 중 <em>큰 금액</em>이 적용된다. <span class="xref">(→ FACTS K)</span></li>
<li><b>1세대1주택 비과세</b> — 양도가 12억 이하, 2년 보유(취득 당시 조정지역이면 2년 거주 추가)면 비과세. 경매 투자자도 실거주 요건을 채우면 이 혜택을 노릴 수 있다.</li>
<li><b>부부 분산</b> — 공동명의면 양도차익이 나뉘어 각자 낮은 누진구간에 들어가고 기본공제도 각자 받는다.</li>
<li><b>장기보유특별공제</b> — 일반 3년부터 연 2%(최대 30%), 1세대1주택 2년 거주 시 최대 80%. 단, <em>중과 대상은 장특공이 배제</em>된다.</li>
</ul>
<div class="box warn"><span class="box-label">주의</span><p>양도세는 개정이 잦고 국세청 예규로 세부가 갈린다. 위 수치는 <em>집필 시점 기준</em>이며, 특히 <b>다주택 중과(2026.5.10~)</b>는 시행 초기라 실무 해석이 유동적이다. 매도 전 반드시 세무사와 국세청 예규로 최종 확인하라.</p></div>

<h3>NPL(부실채권) — 개념과 경계</h3>
<p>지금까지는 경매장에서 <em>물건</em>을 사는 이야기였다. NPL(Non-Performing Loan, 부실채권)은 한 단계 앞으로 가, 경매에 넘어간 그 물건에 걸린 <b>채권 자체</b>를 사는 방식이다. 은행이 부실화된 근저당 채권을 할인해 팔면, 이를 매입한 투자자가 채권자 지위에서 경매에 참여한다.</p>
<ul>
<li><b>기본 구조</b> — 예컨대 채권최고액 3억 원짜리 부실 근저당을 은행에서 2억 원대에 매입한다. 이후 그 물건이 경매로 배당될 때 채권자로서 배당을 받거나, 채권액 범위 내에서 상계로 직접 낙찰(상계 취득)하기도 한다.</li>
<li><b>기대 효과</b> — 배당 우선순위를 활용해 낙찰가 방어·차익을 노리고, 채권 매입가와 회수액의 차이에서 수익을 낸다.</li>
</ul>
<div class="box warn"><span class="box-label">주의</span><p>NPL은 <b>초보에게 권하는 방식이 아니다.</b> 채권 실사(담보가치·선순위·소송 리스크 평가), 대부업·자본시장 관련 규제, 큰 초기 자금이 필요하고, 개인 투자자가 접근할 수 있는 물량과 정보가 제한적이다. "NPL로 고수익 보장"을 내세우는 <em>리딩방·고액 강의는 유사수신·사기 위험</em>이 크니 경계하라. 이 책은 개념 소개에 그친다. 실제로 다루려면 채권·세무·법률 전문가의 검토가 전제되어야 한다.</p></div>

<div class="box case"><span class="box-label">사례</span>
<p><b>재구성한 예시 · 수도권 비규제지역 84㎡ · 1주택 실투자자</b></p>
<p>이 사례의 핵심은 레버리지와 시간이다.</p>
<p>낙찰가 <b>3억 8,000만 원</b>. 취득세·등기·수리·명도 등 부대비용 약 2,000만 원을 더해 총원가 4억 원. 여기서 두 단계로 자금을 회수했다.</p>
<p><b>1단계 — 잔금 때는 대출로.</b> 낙찰 직후에는 세입자가 없으니 경락잔금대출을 활용했다. 비규제 수도권이라 낙찰가의 60% 선인 약 2억 2,800만 원을 대출로 충당했다(방공제·DSR 반영)<span class="xref">(→ 15장 잔금·대출)</span>. 이때 실투입 현금은 약 1억 7,200만 원.</p>
<p><b>2단계 — 대출을 전세보증금으로 갈아끼움.</b> 명도를 끝내고 도배·싱크·조명만 손봐 세를 놓았다. 전세 시세가 3억 3,000만 원이었다<span class="xref">(→ 18장 전세 세팅)</span>. 세입자 보증금으로 잔금대출 2억 2,800만 원을 전액 상환하고도 약 1억 200만 원이 남았다. 최초 현금 1억 7,200만 원에서 이 1억 200만 원을 회수하니, 물건에 묶인 <em>실투자금은 약 4,000만 원(+ 부대비용 일부)</em>으로 줄었다.</p>
<p><b>2년 후 — 매도.</b> 보유 2년째, 시장이 회복되며 실거래가가 4억 8,000만 원까지 올랐다. 이 값에 매도해 전세보증금 3억 3,000만 원을 반환하고 남은 차액으로 정산했다. 양도차익은 매도가 4억 8,000만 원 − 취득원가 약 4억 원 = 약 8,000만 원. 2년 보유로 단기세율(1~2년 60%)을 피하고 기본세율(6~45%) 구간에 들어가, 장기보유특별공제와 기본공제를 반영한 세후 순익이 대략 <em>실투자금 4,000만 원 대비 약 9,000만 원</em> 수준이었다<span class="xref">(→ 18장 · 23장 세금)</span>.</p>
<div class="box warn" style="margin-top:10px"><span class="box-label">주의</span><p>양도세 다주택 중과는 <b>2026-05-10부터 재시행</b>(4년 유예 종료)된다. 조정대상지역 2주택 +20%p, 3주택+ +30%p다. 이 사례는 1주택·2년 보유·기본세율을 전제로 한 재구성이며, 주택 수와 규제지역 여부에 따라 결과가 완전히 달라진다. <b>집필 시점 기준이며 개정될 수 있으니</b> 매도 전 국세청 예규를 확인하라.</p></div>
</div>

<h4>사례 B가 잘한 것</h4>
<ul>
<li><b>대출을 임시 다리로만 썼다.</b> 잔금은 대출로 넘기고, 이자가 붙기 전에 전세보증금으로 갈아끼워 이자 부담을 최소화했다.</li>
<li><b>전세가율이 받쳐주는 물건을 골랐다.</b> 전세 3억 3,000만 원 / 낙찰 3억 8,000만 원 구조라 자금 회수가 가능했다.</li>
<li><b>2년을 채워 단기세율을 피했다.</b> 세금은 출구 타이밍이 절반이다.</li>

<h3>사례 C — 하락장 역발상, 2회 유찰 대단지 줍기</h3>

<div class="box case"><span class="box-label">사례</span>

<p>2회 유찰의 이유는 물건 자체의 하자가 아니라 <b>하락장 심리</b>였다. 등기부는 근저당 하나에 임차인 없는 깨끗한 물건, 권리상 인수 부담이 없었다<span class="xref">(→ 6장 · 9장)</span>. 문제는 "지금 사도 더 떨어지는 것 아니냐"는 공포뿐이었다.</p>

<p><b>결과.</b> 총원가 약 2억 4,500만 원. 전세 2억 6,000만 원을 세팅해 투입 현금을 사실상 0에 가깝게 회수하고(무피에 근접), 급매 시세 3억 2,000만 원 대비 약 7,000만 원 이상의 안전마진을 확보했다. 대단지라 나중에 매도할 때 거래가 잘 된다는 점도 출구를 든든하게 했다.</p>
</div>

<h4>사례 C가 잘한 것</h4>
<ul>
<li><b>유찰의 이유를 구분했다.</b> 물건 하자로 인한 유찰과 심리로 인한 유찰은 전혀 다르다. 후자가 기회다.</li>
<li><b>전세가를 하방 지지선으로 읽었다.</b> 전세가가 버티면 실수요가 있다는 신호다.</li>
<li><b>환금성 좋은 대단지를 택했다.</b> 하락장에서도 대단지는 거래가 끊기지 않아 출구가 살아있다.</li>

<h3>세 사례를 관통하는 한 줄</h3>
<p>세 사람의 성향은 제각각이었다. A는 실거주가 목적인 신중한 첫 입찰자, B는 세금과 레버리지를 계산하는 투자자, C는 하락장의 공포를 거꾸로 읽는 역발상가였다. 그런데 결과를 만든 행동은 놀랄 만큼 겹친다. 셋 다 <b>감정가를 시세로 믿지 않았고</b>, 셋 다 <b>권리상 인수 부담이 없는 물건</b>을 골랐으며, 셋 다 <b>낙찰가가 아니라 총원가로 마진을 계산</b>했다.</p>
<p>특히 눈여겨볼 것은 셋 모두 <em>안전마진</em>을 미리 확보하고 들어갔다는 점이다. A는 시세 대비 12%, C는 급매가 대비 20% 이상을 남기고 낙찰받았다. 이 마진이 곧 실수의 완충재다. 시장이 조금 더 빠지거나 수리비가 예상보다 나와도, 마진이 두꺼우면 손실로 번지지 않는다. 반대로 마진 없이 '시세에 가깝게' 낙찰받으면 작은 변수 하나에 사례 D처럼 마이너스로 뒤집힌다. 성공한 세 사람이 남긴 진짜 교훈은 수익률의 크기가 아니라, <b>손실이 끼어들 틈을 미리 없앴다는 사실</b>이다.</p>
<div class="callout">세 사례의 공통점은 화려한 기술이 아니다. 감정가를 의심하고, 인수 부담 없는 물건을 고르고, 총원가로 마진을 계산했다. 성공은 대개 <em>기본기의 반복</em>이다.</div>

<h3>사례 E — 선순위 대항력 임차인 보증금 2억 7,000만 원을 떠안다</h3>

<p>감정가 <b>5억 5,000만 원</b>, 여러 번 유찰돼 최저가가 3억 5,000만 원까지 내려온 물건이었다. "왜 이렇게 싸지?"라는 질문에 그는 "요즘 경매 물건이 많아서겠지"라고 스스로 답하고 넘어갔다. <em>그 질문의 답이 등기부와 매각물건명세서에 적혀 있었다.</em></p>
<p>임차인이 있었다. 전입신고일이 <b>은행 근저당 설정일보다 하루 앞선</b>, 선순위 대항력 임차인이었다. 보증금은 <em>2억 7,000만 원</em>. 대항력은 점유+전입신고 다음 날 0시부터 발생하는데, 이 임차인은 근저당보다 먼저 대항요건을 갖췄다<span class="xref">(→ 7장 대항력)</span>.</p>
<p>결정적으로 이 임차인은 <b>배당요구를 하지 않았다</b>. 말소기준권리보다 앞선 대항력 임차인이 배당요구를 하지 않으면, 그 보증금은 배당으로 소멸하지 않고 <em>낙찰자가 고스란히 인수</em>한다<span class="xref">(→ 7장 · 8장 배당)</span>. 매각물건명세서의 인수사항 란에 그 취지가 적혀 있었지만, 그는 그 칸을 읽지 않았다.</p>

<h3>사례 F — 8개월 공실이 삼킨 수익 (명도 장기전)</h3>

<p>권리는 깨끗했고 가격도 좋았다. 문제는 사람이었다. 점유자는 배당을 한 푼도 받지 못하는 전 소유자였다. 그는 문을 열어주지 않았고, 이사비를 <b>1,000만 원</b> 요구하며 버텼다.</p>
<p>낙찰자의 실수는 순서였다. 그는 대화가 안 되자 감정적으로 대치했고, <em>인도명령 신청을 미뤘다</em>. 인도명령은 대금납부 후 6개월 이내에 신청할 수 있고, 잔금과 동시에 신청해두는 것이 정석인데<span class="xref">(→ 17장 인도명령)</span> 그는 "대화로 풀어보겠다"며 두 달을 흘려보냈다. 뒤늦게 인도명령을 신청했지만 심리·송달·계고를 거쳐 강제집행에 이르기까지 다시 여러 달이 걸렸다.</p>
<p><b>결과.</b> 잔금부터 실제 명도 완료까지 <em>8개월</em>. 그동안 경락잔금대출 이자는 매달 나갔고(월 100만 원대), 세를 놓지 못해 그만큼의 임대수익도 증발했다. 강제집행 비용(계고·노무비·유체동산 보관 등)으로 수백만 원이 추가됐다<span class="xref">(→ 17장 강제집행 비용)</span>. 낙찰가에서 아꼈던 마진을 8개월의 시간과 이자가 거의 다 삼켰다.</p>
</div>
<div class="box tip" style="margin-top:10px"><span class="box-label">실전 팁</span><p>명도의 철칙은 '<b>강한 절차를 깔고, 부드럽게 대화한다</b>'다. 잔금과 동시에 인도명령을 신청해 법적 시계를 돌려두고, 그 위에서 이사비를 협상하라. 절차를 미루고 감정으로 대치하면 시간은 언제나 점유자 편이다. 시간이 곧 돈인 쪽은 낙찰자다.</p></div>
<p><b>부검 소견:</b> 사인은 절차 지연. 16·17장의 '인도명령 선(先)신청, 대화는 그 위에서'라는 순서를 뒤집은 대가를 8개월의 공실로 치렀다.</p>

<h3>실패의 공통분모 — 검증 없는 확신</h3>
<p>세 부검대를 나란히 놓으면 사인이 하나로 수렴한다. <em>검증 없는 확신</em>이다.</p>
<div class="table-wrap"><table><thead><tr><th>사례</th><th>확신했던 것</th><th>건너뛴 검증</th><th>대가</th></tr></thead>
<tbody>
<tr><td>D</td><td>"감정가가 시세다"</td><td>실거래가 삼각측량</td><td class="num">-6,000만 원+</td></tr>
<tr><td>E</td><td>"싼 데는 별 이유 없다"</td><td>매각물건명세서·전입일</td><td class="num">인수 2.7억</td></tr>
<tr><td>F</td><td>"대화로 풀린다"</td><td>인도명령 선신청</td><td class="num">8개월 공실</td></tr>
</tbody>
<caption>실패 3사례의 공통 구조 (재구성한 예시)</caption></table></div>
<p>세 사람 모두 게을러서 망한 것이 아니다. 오히려 자신의 판단을 <b>너무 믿어서</b> 망했다. 확신은 검증의 필요를 지운다. 그래서 경매에서 가장 비싼 감정은 자신감이다. 반대로 가장 싼 보험은 '한 번 더 확인'이다. 등기부 한 번 더, 명세서 한 번 더, 실거래가 한 번 더. 이 세 번의 '한 번 더'가 위 세 건의 손실을 전부 막았을 것이다.</p>
<p>주목할 점은 세 실수 모두 <b>고급 지식의 부재가 아니었다</b>는 것이다. 감정가와 시세의 차이(11장), 대항력 임차인의 인수(7장), 인도명령의 타이밍(17장)은 이 책의 기초 파트에서 이미 다룬 내용이다. 즉 그들은 몰라서 틀린 게 아니라, <em>알면서도 확인하지 않아서</em> 틀렸다. 경매에서 파산을 부르는 것은 대개 난해한 특수물건이 아니라, 기본 절차를 '이번엔 괜찮겠지' 하고 건너뛰는 순간이다.</p>
<p>실패를 부검하는 이유는 겁을 주기 위해서가 아니다. 정반대다. 이 세 사인(死因)은 모두 <b>체크리스트로 예방 가능</b>하다는 것을 보여주기 위해서다. 감정 시점을 확인했는가, 명세서 인수사항 란을 읽었는가, 잔금과 동시에 인도명령을 신청했는가. 세 개의 질문에 '예'라고 답할 수만 있으면 위 세 사람의 운명은 갈리지 않았다. 실패는 무섭지만, 예방책은 이토록 단순하다.</p>

<div class="callout">경매는 확신을 파는 시장이 아니라 <em>의심을 사는 시장</em>이다. "왜 이렇게 쌀까"라는 질문에 스스로 답하지 말고, 서류에서 답을 찾아라. 답이 없으면 그 물건은 넘겨라.</div>

<div class="keytake"><div class="kt-label">이 장의 핵심</div><ul>
<li>사례 D: 감정가를 시세로 착각하면 낙찰 순간이 곧 손실 확정 순간이 된다. 실거래가 삼각측량은 생략 불가다.</li>
<li>사례 E: 말소기준보다 앞선 대항력 임차인이 배당요구를 안 하면 보증금은 낙찰자 인수다. 매각물건명세서와 전입일-근저당일 하루 차이를 반드시 확인하라.</li>
<li>사례 F: 인도명령을 미루면 시간은 점유자 편이 된다. 잔금과 동시에 신청하고 대화는 그 위에서 하라.</li>
<li>공통분모는 '검증 없는 확신'이다. 가장 싼 보험은 등기부·명세서·시세를 각각 '한 번 더' 확인하는 일이다.</li>
</ul></div>

<p>지금까지의 지식은 장(章)별로 흩어져 있었다. 이 장은 그 조각들을 하나의 사건으로 꿴다. 가상의 투자자 '김과장'의 1년을 검색부터 전세 세팅까지 단계별로 따라가며, 각 단계마다 책의 어느 장이 작동하는지 표시했다. 이 한 편의 시나리오를 끝까지 읽으면, 27개 장이 왜 그 순서로 놓였는지 몸으로 이해하게 된다. <em>김과장과 그의 물건은 재구성한 예시</em>다.</p>

<div class="box scen"><span class="box-label">시나리오</span>
<p><b>주인공</b> 김과장 · 40대 직장인 · 무주택 · <b>종잣돈 8,000만 원</b> · <b>목표수익 15%</b> · 1년의 기록</p>

<h4>1단계 · 검색 (1~4주)</h4>
<p>김과장은 주 1회, 일요일 밤 30분을 검색 루틴으로 정했다<span class="xref">(→ 10장 검색 루틴)</span>. 대법원 법원경매정보에서 관심 지역, 전용 59~84㎡, 감정가 5억 이하, 유찰 1회 이상으로 필터를 걸었다. 4주간 12건을 후보로 추렸고, 그중 감정가 <b>4억 2,000만 원</b>, 1회 유찰로 최저가 3억 3,600만 원(20% 저감)까지 내려온 물건 한 건에 집중했다.</p>

<h4>2단계 · 권리분석 (5~6주)</h4>
<p>인터넷등기소에서 등기부를 발급(1,000원)해 갑구·을구를 뜯어봤다<span class="xref">(→ 5장 등기부)</span>. 최선순위는 은행 근저당, 이후 가압류 하나. 임차인은 전입세대확인서상 소유자 세대뿐. 근저당이 말소기준권리이고 그보다 앞선 권리가 없으니 전부 소멸, 인수 부담 없음<span class="xref">(→ 6장 말소기준권리)</span>. 매각물건명세서의 인수사항 란도 비어 있었다<span class="xref">(→ 7장 임차인 분석)</span>. '안전물건'으로 확정<span class="xref">(→ 9장 3색 분류)</span>.</p>

<h4>3단계 · 시세조사 (7주)</h4>
<p>감정가 4억 2,000만 원은 감정 시점이 반년 전. 국토부 실거래가로 최근 3개월 같은 평형을 뽑으니 3억 8,000만~4억 원, KB시세도 비슷했고 중개사무소 급매 호가는 3억 7,000만 원이었다. 세 값을 삼각측량해 <em>진짜 시세를 3억 9,000만 원</em>으로 확정했다<span class="xref">(→ 11장 시세조사)</span>.</p>

<h4>4단계 · 임장 (8주)</h4>
<p>토요일 오후 세 시간. 32항목 체크리스트로 채광·주차·소음·역세권을 확인하고, 관리사무소에서 공용부분 관리비 체납 18만 원을 파악(승계 대상, 연체료는 제외)<span class="xref">(→ 12장 임장 · 15장 관리비)</span>. 우편함·계량기로 실제 점유 상태도 눈으로 확인했다.</p>

<h4>5단계 · 1차 입찰 — 패찰 (9주)</h4>
<p>총비용을 계산했다. 취득세 약 380만 원, 명도비 예비 200만 원, 기본 수리 400만 원. 목표수익 15%를 지키려면 입찰 상한은 3억 4,000만 원 안쪽이어야 했다<span class="xref">(→ 13장 입찰가 산정)</span>. 김과장은 <em>3억 3,900만 원</em>을 적었다. 결과는 패찰. 낙찰자는 3억 5,200만 원을 썼다. 목표수익을 지키려면 따라갈 수 없는 값이었다. 그는 원칙대로 물러섰다. 패찰 후 낙찰가를 기록해 자신의 감(感)을 보정했다<span class="xref">(→ 14장 패찰의 기술)</span>.</p>
<div class="box tip" style="margin-top:8px"><span class="box-label">실전 팁</span><p>패찰은 실패가 아니다. <b>규율의 증거</b>다. 목표수익을 깨면서까지 이기는 입찰은 사례 D의 길이다. 진 게임을 기록하면 다음 게임이 정확해진다.</p></div>

<h4>6단계 · 재도전 낙찰 (14주)</h4>
<p>한 달여 뒤, 비슷한 조건의 다른 물건이 나왔다. 감정가 <b>4억 원</b>, 1회 유찰로 최저가 3억 2,000만 원. 같은 루틴(권리분석→시세조사→임장)을 반복했다. 진짜 시세 3억 8,000만 원. 이번엔 경쟁이 덜하다고 판단해 <em>3억 3,300만 원</em>을 적었고, 3억 3,000만 원대 2등을 근소하게 눌러 <b>최고가매수신고인</b>으로 호명됐다<span class="xref">(→ 14장 입찰 당일)</span>. 매수신청보증금은 최저가의 10%였다.</p>

<h4>7단계 · 잔금·대출 (15~18주)</h4>
<p>매각기일로부터 1주 내 매각허가결정, 다시 항고 없이 확정. 확정 후 1개월 이내로 지정된 잔금기한에 맞춰 경락잔금대출을 실행했다<span class="xref">(→ 15장 잔금·대출)</span>. 비규제 수도권이라 낙찰가의 약 60%인 2억 원을 대출로 충당(방공제·DSR 반영), 나머지는 종잣돈에서 냈다. 취득세는 잔금완납일부터 60일 이내 신고·납부했다.</p>
<div class="box warn" style="margin-top:8px"><span class="box-label">주의</span><p>규제지역이라면 그림이 완전히 달라진다. <b>2025-10-15 대책</b>으로 서울 25개 구 전역과 경기 12곳이 3중 규제(조정+투기과열+토허)로 묶였고, 무주택 LTV는 40%로 내려간다. 다만 경매 낙찰은 토지거래허가가 불필요하고 주담대 미이용 시 2년 실거주의무가 면제되는 이점이 있다. <b>지정·해제는 수시로 바뀌니</b> 물건 소재지의 최신 규제 여부를 국토부에서 확인하라. 집필 시점 기준이며 개정될 수 있다.</p></div>

<h4>8단계 · 명도 (19~22주)</h4>
<p>김과장은 잔금과 <b>동시에 인도명령을 신청</b>했다(사례 F의 실수를 피한 것)<span class="xref">(→ 17장 인도명령)</span>. 그 위에서 점유자(전 소유자)와 부드럽게 대화했다. 이사비 150만 원과 6주의 시간을 주는 조건으로 합의, 강제집행 없이 열쇠를 넘겨받고 명도확인서를 교부했다<span class="xref">(→ 16장 명도)</span>. 명도 완료까지 잔금 후 약 6주.</p>

<h4>9단계 · 전세 세팅 (23~26주)</h4>
<p>도배·장판·조명·싱크만 손봐 400만 원 안쪽으로 마감하고, 전세 3억 원에 세입자를 들였다<span class="xref">(→ 18장 출구전략)</span>. 전세보증금 3억 원으로 잔금대출 2억 원을 전액 상환하고 1억 원이 남았다. 종잣돈에서 물건에 묶였던 현금이 대부분 회수돼, <em>실투자금은 부대비용 포함 약 1,500만 원</em> 수준으로 줄었다.</p>

<p>총원가 3억 4,600만 원에 시세 3억 8,000만 원. 시세 대비 약 <em>9% 싸게</em> 산 셈이고, 부대비용을 감안해도 목표수익 15% 근방의 평가이익을 확보했다. 무엇보다 종잣돈 8,000만 원 중 대부분이 회수돼 다음 물건을 노릴 실탄이 되살아났다. 김과장의 1년은 특별한 재능이 아니라, <b>27개 장을 순서대로 밟은 결과</b>였다.</p>

<h4>김과장이 넘어질 뻔한 세 번의 갈림길</h4>
<p>이 시나리오가 매끄러웠던 것은 우연이 아니다. 김과장은 세 번의 결정적 갈림길에서 '실패 사례의 반대편'을 골랐다. 첫째, 시세조사 단계에서 감정가 4억 2,000만 원을 그대로 믿었다면 사례 D처럼 고가 낙찰로 갔을 것이다. 그는 실거래가로 3억 9,000만 원을 확정하고 그 아래에서만 움직였다. 둘째, 1차 입찰에서 낙찰 욕심에 3억 5,000만 원을 따라 썼다면 목표수익이 깨졌을 것이다. 그는 패찰을 감수하고 물러섰다<span class="xref">(→ 14장)</span>. 셋째, 명도에서 대화만 믿고 인도명령을 미뤘다면 사례 F의 8개월이 재현됐을 것이다. 그는 잔금과 동시에 신청해두었다.</p>

<p>이제 지식은 충분하다. 남은 것은 실행이다. 이 마지막 장은 당신의 첫 입찰까지를 90일 로드맵으로 압축한다. 공부-모의분석-실전의 3단계, 모의입찰 훈련법, 그리고 손절 기준을 포함한 투자 10계명. 여기까지 오면 당신은 더 이상 독자가 아니라 <em>다음 사례의 주인공</em>이다. 조급함만 다스리면 된다. 첫 낙찰의 목표는 큰 수익이 아니라 <b>큰 실수를 피한 완주</b>다.</p>

<p>손절 기준을 미리 정해두면 좋은 점이 하나 더 있다. <b>결정을 감정에서 규칙으로 옮겨준다</b>는 것이다. 막상 손실 구간에 들어가면 사람은 "조금만 더 버티면 오르겠지"라며 근거 없는 희망에 매달린다. 그 순간 판단을 대신해주는 것이 입찰 전에 종이에 적어둔 손절선이다. 규칙은 흔들리는 나를 대신해 냉정하게 결정한다. 그래서 손절선은 머릿속이 아니라 반드시 <em>글로 적어</em> 둬야 한다.</p>
<p>마지막으로 당부한다. 첫 물건은 크게 벌려고 하지 마라. 이 책이 반복해서 말한 대로, 첫 낙찰의 목표는 수익률이 아니라 <b>완주</b>다. 검색·권리분석·시세조사·임장·입찰·잔금·명도·출구까지 한 사이클을 큰 사고 없이 돌아보는 것, 그 경험 자체가 다음 열 건을 지탱하는 자산이 된다. 작게 시작하고, 원칙을 지키고, 기록하라. 그러면 두 번째 물건에서 당신은 이미 초보가 아니다.</p>

<p>매매는 실거주 2년에 묶이지만 경매는 (아래 조건만 맞으면) 전세를 놓는 방식도 가능하다. 2025년 11월 이후 서울 아파트 낙찰가율이 100퍼센트를 넘고 일부 인기 단지가 감정가의 160퍼센트 넘게 낙찰된 배경에는 이 "경매 우회로"로 몰린 투자수요가 있다. <span class="xref">(→ 4장)</span></p>

<h4>실거주의무는 세 종류다 — 뭉뚱그리지 마라</h4>
<p>"경매는 실거주의무가 없다"는 말은 절반만 맞다. 서로 다른 세 가지 의무를 구분해야 한다.</p>

<li><b>되팔 때 토허 부활</b> — 경매로 산 물건을 다시 일반 매매로 팔면, 토지거래허가구역이 유지되는 한 그 매매에는 허가가 다시 필요하다. 출구까지 함께 계산해야 한다.</li>

<h3>권리분석에서 놓치는 것</h3>

<h4>1. 대위변제로 인한 순위 상승 — 가장 치명적인 함정</h4>
<p>등기부에서 선순위 근저당이 말소기준권리라 후순위 임차인의 대항력이 소멸한다고 보고 안심하고 낙찰한다. 그런데 그 선순위 근저당의 채권최고액이 <b>몇백만 원짜리 소액</b>이라면 경계해야 한다. 후순위 임차인이 <b>잔금 납부 전에</b> 이 소액 근저당을 대신 갚아(대위변제) 말소시키면, 임차인이 최선순위 대항력자로 올라서고 그 보증금은 고스란히 낙찰자가 인수한다.</p>
<div class="box law"><span class="box-label">판례</span><p>대법원 2002다70075 — 대항력의 존속 여부를 판단하는 기준시점은 <b>낙찰대금 지급기일(잔금일)</b>이다. 배당요구 종기가 지났더라도 입찰과 잔금 사이에 선순위 근저당이 대위변제로 소멸하면 임차권의 대항력이 되살아난다.</p></div>
<p><b>방어법</b> — ① 선순위 근저당 잔액이 소액이면 대위변제 유인이 크다는 신호다. ② <b>잔금 납부 직전 등기부를 다시 떼어</b> 선순위 근저당이 말소됐는지 확인하라. 말소됐다면 매각불허가나 매각허가결정 취소를 신청할 수 있다. <span class="xref">(→ 7장)</span></p>

<h4>2. 위장(가장)임차인 — 있는 척, 없는 척</h4>
<p>대항력 있어 보이는 선순위 전입자가 실은 채무자의 친인척인 허위 임차인일 수 있고, 반대로 진짜 임차인을 가장으로 오판할 수도 있다. 판단이 틀리면 수천만~수억 원이 오간다. 다음 신호가 겹치면 가장임차인을 의심하라.</p>
<ul class="check">
<li>확정일자가 없거나 유난히 늦다</li>
<li>전입일이 경매개시결정 등기 시점 전후로 몰려 있다</li>
<li>보증금을 실제 이체한 통장 내역·영수증이 없다</li>
<li>계약서에 중개업소 날인이 없고 최근 서식으로 소급 작성된 정황이 있다</li>
<li>임차인과 채무자가 가족·지인 관계다</li>
</ul>
<div class="box law"><span class="box-label">판례</span><p>대법원 2016다248431 — 금융기관에 <b>무상거주확인서</b>를 써 준 사람이 나중에 임차인으로서 대항력을 주장하는 것은 신의칙에 반해 허용되지 않는다. 선순위 임차인 물건에서 무상거주확인서의 존재는 강력한 방어 무기가 된다. <span class="xref">(→ 19장)</span></p></div>

<h4>3. 인수되는 선순위 권리 — 가등기·가처분·지상권·환매</h4>
<p>말소기준권리보다 <b>앞서</b> 등기된 소유권이전청구권 가등기, 가처분, 지상권, 환매특약등기는 낙찰로 소멸하지 않고 <b>낙찰자가 인수</b>한다. 특히 선순위 소유권이전청구권 가등기가 본등기되면 낙찰자가 소유권을 잃을 수 있다. (담보가등기는 말소기준권리로 취급되어 소멸하니, 순위보전 가등기와 반드시 구별하라.) 선순위에 이런 권리가 보이면 원칙적으로 회피한다. <span class="xref">(→ 6장)</span></p>

<h4>4. 배당요구 안 한 대항력 임차인 · 전입세대 없어도 점유자</h4>
<p>말소기준권리보다 앞선 대항력 임차인이 <b>배당요구 종기까지 배당요구를 하지 않았거나</b> 배당을 일부만 받았다면, 미변제 잔액을 낙찰자가 떠안는다. 배당요구를 취하해도 대항력은 그대로 유지된다는 점도 함정이다. 또한 전입세대확인서에 아무도 없더라도 <b>무상거주자·유치권 주장자·전 소유자</b> 같은 실제 점유자가 있을 수 있으니 반드시 현장에서 확인하라. <span class="xref">(→ 7장·12장)</span></p>

<h3>비용에서 놓치는 것</h3>

<h4>5. 미납 관리비 — 공용부분만, 연체료·전유는 제외</h4>
<p>전 소유자의 체납관리비를 전액 떠안는다고 오해하거나, 반대로 낙찰가에 아예 반영하지 않는다. 정답은 그 중간이다.</p>
<ul>
<li>낙찰자는 <b>공용부분 관리비 원금만</b> 승계한다(집합건물법 제18조, 대법원 2001다8677 전합).</li>
<li>전유부분(개별 전기·수도·난방)과 <b>연체료는 승계하지 않는다.</b> 공용부분 관리비의 연체료조차 승계 대상이 아니다.</li>
<li>관리비채권의 소멸시효는 <b>3년</b>이라 그 이전 분은 시효로 소멸했다고 주장할 수 있다.</li>
</ul>
<p>낙찰 전 관리사무소에 체납 내역과 공용·전유 구분을 확인해 <b>공용부분 원금만</b> 자금계획에 넣어라. 관리단이 단전·단수로 압박하는 것은 불법이다. <span class="xref">(→ 12장)</span></p>

<h4>6. 잔금 대출 축소 — 방공제 부활(2026)과 DSR</h4>
<p>"낙찰가의 80퍼센트 대출" 광고만 믿었다가 실제 실행액이 크게 줄어 잔금을 못 치르는 <b>'잔금 지옥'</b>이 초보 파산 1순위다. 2026년 들어 조건이 더 나빠졌다.</p>
<ul>
<li><b>방공제 부활</b> — 종전에는 아파트를 MCI·MCG 보험으로 방공제 없이 대출받을 수 있었으나, 2026년 6월 국민은행 등이 이 보험 가입을 제한하면서 아파트도 <b>지역별 소액임차보증금(서울 5,500만 원 등)을 대출한도에서 선차감</b>당하게 됐다. ⚠️ 은행·시점별로 다르니 확인 필요.</li>
<li><b>스트레스 DSR 3단계</b> — 가산금리가 붙어 한도가 더 줄고, 소득이 낮으면 급감한다.</li>
</ul>
<p>입찰 전 은행이나 대출상담사에게 <b>해당 물건 소재지 기준 방공제액과 DSR을 반영한 실제 실행 가능액</b>을 반드시 확인하고 보수적으로 잡아라. <span class="xref">(→ 15장)</span></p>

<h4>7. 위반건축물 — 이행강제금 폭탄</h4>
<p>베란다 확장, 옥탑·다락 개조, 근린생활시설 불법 용도변경 등으로 건축물대장에 <b>'위반건축물'</b>로 등재된 물건은 시정될 때까지 <b>매년 이행강제금</b>이 반복 부과되고, 양성화가 불가능한 경우도 많다. 입찰 전 건축물대장(정부24)에서 위반건축물 표기를 반드시 확인하라.</p>

<h3>절차에서 놓치는 것</h3>

<h4>8. 재매각 신호 — 보증금 20~30퍼센트</h4>
<p>매수신청보증금이 최저가의 10퍼센트가 아니라 <b>20~30퍼센트</b>로 적혀 있으면, 직전 낙찰자가 잔금을 못 내 보증금을 몰취당한 <b>재매각 사건</b>이라는 신호다. 수천만~수억 원을 포기하면서까지 잔금을 안 낸 데에는 대위변제·유치권·명도 난항 등 중대한 이유가 있을 수 있다. <b>왜 미납했는지</b>부터 규명하고, 이유가 불명확하면 회피하라.</p>

<h4>9. 특별매각조건과 비고란 — 토지별도등기 인수</h4>
<p>매각물건명세서의 <b>비고란·특별매각조건</b>에 핵심 경고가 숨어 있다. 아파트에서 특히 주의할 것은 <b>토지별도등기 인수조건</b>(집합건물 대지에 남은 저당권 등을 낙찰자가 인수)과 <b>대지권 미등기·대지권 없음</b>이다. 반면 <b>농지취득자격증명</b>은 농지에만 해당하니 일반 아파트는 신경 쓸 필요가 없다. <span class="xref">(→ 22장)</span></p>

<h4>10. 명도확인서 타이밍 — 협상의 지렛대</h4>
<p>배당받는 임차인은 법원에서 배당금을 수령할 때 <b>낙찰자의 명도확인서와 인감증명서</b>를 제출해야 한다. 즉 임차인은 낙찰자의 서류가 없으면 배당금을 못 받는다. 이 순서를 알면 명도가 훨씬 수월해진다. <b>짐을 빼고 열쇠를 넘겨받은 사실을 확인한 뒤</b> 명도확인서를 내주는 것이 원칙이다. 먼저 내주면 임차인이 배당만 받고 버틸 수 있다. <span class="xref">(→ 16장)</span></p>

<h4>11. 공유자우선매수권·차순위매수신고로 낙찰이 뒤집힌다</h4>
<p><b>지분경매</b>에서는 기존 공유자가 매각기일까지 보증을 내고 <b>최고가와 같은 금액</b>으로 우선매수를 신고하면, 애써 최고가를 써낸 사람을 제치고 공유자가 가져간다. 지분 물건은 이 가능성을 처음부터 전제하고 접근해야 한다. 단독소유 아파트 전체 경매에는 공유자우선매수권이 없다. <span class="xref">(→ 21장)</span></p>

<h3>세금에서 놓치는 것</h3>

<h4>12. 취득시기·주택 수·단기 양도</h4>
<ul>
<li><b>취득 시기는 잔금(대금)납부일</b>이다(낙찰일이 아니다). 주택 수와 조정지역 여부도 이 날 기준으로 판정하므로, 잔금 전에 기존 주택을 처분하면 취득세 중과를 피할 여지가 있다.</li>
<li><b>주택 수 산정</b>에는 분양권·입주권·주거용 오피스텔도 포함될 수 있다. 상속주택·지방 저가주택(공시가 2억 이하) 등 제외 특례를 확인하라.</li>
<li><b>단기 양도</b>는 1년 미만 70퍼센트, 1~2년 60퍼센트로 세금이 치명적이다. 경매 단타는 세후 수익이 거의 남지 않을 수 있다.</li>
</ul>
<p>입찰 전 세무사에게 예상 잔금일 기준으로 본인의 주택 수·중과율·보유기간별 양도세를 시뮬레이션받아라. <span class="xref">(→ 23장)</span></p>

/* ── 평탄화: 렌더링/네비게이션용 ── */
const PAGES = [];
BOOK.forEach(block => {
  if (block.type === 'solo') { PAGES.push({...block, partName: block.part}); }
  else block.chapters.forEach(ch => PAGES.push({...ch, type:'chapter', partName: block.part, partLevel: block.level, partDesc: block.desc}));
});
const byId = Object.fromEntries(PAGES.map(p => [p.id, p]));

const STATUS = { prose:{label:'원고 초안', cls:'draft'}, draft:{label:'초안 작성 중', cls:'draft'}, todo:{label:'집필 예정', cls:''} };
const TAGLABEL = { case:{label:'사례', cls:'case'}, scen:{label:'시나리오', cls:'scen'} };

/* ── 사이드바 렌더 ── */
function renderNav() {
  const nav = document.getElementById('nav');
  let h = '';
  BOOK.forEach(block => {
    if (block.type === 'solo') {
      h += `<div class="nav-part"><a class="navlink solo" data-id="${block.id}">
              <span class="cnum">${block.num}</span><span>${block.title}</span></a></div>`;
    } else {
      const [pnum, ...rest] = block.part.split('. ');
      const ptitle = rest.join('. ') || pnum;
      h += `<div class="nav-part">
        <div class="part-label"><span class="pnum">${block.part.startsWith('부록') ? '' : pnum}</span>
        <span class="ptitle">${block.part.startsWith('부록') ? block.part : ptitle}</span></div>`;
      block.chapters.forEach(ch => {
        h += `<a class="navlink" data-id="${ch.id}"><span class="cnum">${ch.num}</span><span>${ch.title}</span></a>`;
      });
      h += `</div>`;
    }
  });
  nav.innerHTML = h;
  nav.querySelectorAll('.navlink').forEach(a =>
    a.addEventListener('click', () => { location.hash = a.dataset.id; closeNav(); }));
}

/* ── 본문 렌더 ── */
function renderDoc(id) {
  const p = byId[id] || PAGES[0];
  const idx = PAGES.findIndex(x => x.id === p.id);
  const st = STATUS[p.status] || STATUS.todo;

  // 브레드크럼
  document.getElementById('crumb').innerHTML =
    `<span>${p.partName}</span>` + (p.type==='chapter' && p.partLevel ? `<span class="dot"></span><span>${p.partLevel}</span>`:'');

  // 태그
  const tags = (p.tags||[]).map(t => `<span class="badge ${TAGLABEL[t].cls}">${TAGLABEL[t].label}</span>`).join('');
  let body;
  const full = (typeof CONTENT !== 'undefined' && CONTENT[p.id]) ? CONTENT[p.id] : p.html;
  const statusBadge = full ? '' : `<span class="badge status ${st.cls}">${st.label}</span>`;
  if (full) {
    body = `<div class="prose">${full}</div>`;
  } else {
    // 개요(자리표시자)
    const lead = p.partDesc ? `<p class="lead">${p.partDesc}</p>` : '';
    const items = (p.subs||[]).map(s => {
      if (typeof s === 'string') return `<li>${s}</li>`;
      return `<li>${s.t}<span class="ex">${s.ex}</span></li>`;
    }).join('');
    body = `${lead}<p class="outline-title">이 장에서 다룰 내용</p><ol class="outline">${items}</ol>`;
  }

  document.getElementById('doc').innerHTML = `
    <div class="doc-head">
      <div class="chno">${p.num}</div>
      <h2>${p.title}</h2>
      <div class="meta">${tags}${statusBadge}</div>
    </div>${body}`;

  // 이전/다음
  const prev = PAGES[idx-1], next = PAGES[idx+1];
  document.getElementById('pager').innerHTML =
    (prev ? `<a class="prev" href="#${prev.id}"><div class="dir">← 이전</div><div class="t">${prev.num} ${prev.title}</div></a>`
          : `<a class="prev disabled"><div class="dir">← 이전</div><div class="t">처음</div></a>`) +
    (next ? `<a class="next" href="#${next.id}"><div class="dir">다음 →</div><div class="t">${next.num} ${next.title}</div></a>`
          : `<a class="next disabled"><div class="dir">다음 →</div><div class="t">끝</div></a>`);

  // 활성 표시
  document.querySelectorAll('.navlink').forEach(a =>
    a.classList.toggle('active', a.dataset.id === p.id));

  document.querySelector('.main-inner').scrollIntoView({block:'start'});
  window.scrollTo(0,0);
}

/* ── 테마 ── */
function initTheme() {
  const saved = (()=>{ try { return localStorage.getItem('aab-theme'); } catch(e){ return null; } })();
  document.documentElement.setAttribute('data-theme', saved || 'light'); // 라이트 기본
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', cur);
  try { localStorage.setItem('aab-theme', cur); } catch(e){}
}

/* ── 모바일 드로어 ── */
function openNav(){ document.body.classList.add('nav-open'); }
function closeNav(){ document.body.classList.remove('nav-open'); }

/* ── 검색 ── */
let SEARCH_INDEX = null;
function stripHTML(s){ return String(s||'').replace(/<[^>]+>/g,' ').replace(/&[a-z]+;/g,' ').replace(/\s+/g,' ').trim(); }
function buildSearchIndex(){
  if (SEARCH_INDEX) return SEARCH_INDEX;
  SEARCH_INDEX = PAGES.map(p => {
    const raw = (typeof CONTENT !== 'undefined' && CONTENT[p.id]) ? CONTENT[p.id]
      : (p.html || (p.subs||[]).map(s => typeof s === 'string' ? s : (s.t + ' ' + (s.ex||''))).join(' '));
    const text = stripHTML(raw);
    return { id:p.id, num:p.num, title:p.title||'', part:p.partName||'', text,
             hay:((p.title||'') + ' ' + text).toLowerCase() };
  });
  return SEARCH_INDEX;
}
function esc(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function reEsc(q){ return q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function hl(text, q){ return esc(text).replace(new RegExp('(' + reEsc(q) + ')', 'ig'), '<mark>$1</mark>'); }
function snippet(text, q){
  const i = text.toLowerCase().indexOf(q.toLowerCase());
  if (i < 0) return esc(text.slice(0,120));
  const s = Math.max(0, i-45), e = Math.min(text.length, i + q.length + 90);
  return (s>0?'… ':'') + hl(text.slice(s,e), q) + (e<text.length?' …':'');
}
function renderSearch(q){
  const query = q.trim();
  const idx = buildSearchIndex();
  const ql = query.toLowerCase();
  const hits = idx.filter(e => e.hay.includes(ql));
  const box = document.getElementById('searchResults');
  let html = `<div class="sr-head"><b>${esc(query)}</b> · ${hits.length}건</div>`;
  if (!hits.length){
    html += `<div class="none">일치하는 내용이 없습니다.<br>다른 낱말로 검색해 보세요.</div>`;
  } else {
    html += hits.map(e =>
      `<a href="#${e.id}" data-nav="1"><span class="rnum">${e.num}</span><span class="rtitle">${hl(e.title, query)}</span><span class="rsnip">${snippet(e.text, query)}</span></a>`
    ).join('');
  }
  box.innerHTML = html;
  box.hidden = false;
  document.getElementById('nav').hidden = true;
}
function clearSearch(reset){
  document.getElementById('searchResults').hidden = true;
  document.getElementById('searchResults').innerHTML = '';
  document.getElementById('nav').hidden = false;
  if (reset){ const s = document.getElementById('search'); s.value = ''; document.getElementById('searchClear').hidden = true; }
}
function onSearchInput(){
  const q = document.getElementById('search').value;
  document.getElementById('searchClear').hidden = !q;
  if (q.trim().length >= 1) renderSearch(q);
  else clearSearch(false);
}

/* ── 부트 ── */
initTheme();
renderNav();
document.getElementById('themeBtn').addEventListener('click', toggleTheme);
document.getElementById('themeBtn2').addEventListener('click', toggleTheme);
document.getElementById('menuBtn').addEventListener('click', openNav);
document.getElementById('backdrop').addEventListener('click', closeNav);
document.getElementById('search').addEventListener('input', onSearchInput);
document.getElementById('searchClear').addEventListener('click', () => { clearSearch(true); document.getElementById('search').focus(); });
document.getElementById('searchResults').addEventListener('click', e => {
  if (e.target.closest('[data-nav]')) { clearSearch(true); closeNav(); }
});
window.addEventListener('hashchange', () => { clearSearch(true); renderDoc(location.hash.slice(1)); });
renderDoc(location.hash.slice(1) || 'prologue');
</script>
