<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="일본어 가이드북. 제로에서 JLPT N1까지 이어지는 학습 로드맵.">
  <link rel="icon" href="data:,">
  <title>일본어 가이드북</title>
  <script>
    (function () {
      var saved = localStorage.getItem("aab-theme");
      document.documentElement.setAttribute("data-theme", saved === "dark" ? "dark" : "light");
    })();
  </script>
  <style>
    :root,
    :root[data-theme="light"] {
      --bg: #F3F6F1;
      --paper: #FFFFFF;
      --sidebar: #F8FAF5;
      --ink: #1B2029;
      --ink-soft: #525A67;
      --ink-faint: #5E6671;
      --line: #E0E7DE;
      --line-soft: #ECF2E9;
      --seal: #2F6F4E;
      --seal-soft: #E3F0E7;
      --navy: #2C3A55;
      --navy-soft: #E9ECF3;
      --sel: #E8F0E6;
      --shadow: 0 1px 2px rgba(20,24,32,.04), 0 8px 28px rgba(20,24,32,.05);
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-8: 32px;
      --space-10: 40px;
      --space-12: 48px;
      --space-16: 64px;
    }

    :root[data-theme="dark"] {
      --bg: #13161B;
      --paper: #1B1F26;
      --sidebar: #171A20;
      --ink: #E9E8E2;
      --ink-soft: #AEB4BE;
      --ink-faint: #A5ABB4;
      --line: #2A2F38;
      --line-soft: #22262E;
      --seal: #7FC59A;
      --seal-soft: #1D3327;
      --navy: #9FB0D4;
      --navy-soft: #242B39;
      --sel: #232833;
      --shadow: 0 1px 2px rgba(0,0,0,.2), 0 10px 30px rgba(0,0,0,.28);
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme]) {
        --bg: #13161B;
        --paper: #1B1F26;
        --sidebar: #171A20;
        --ink: #E9E8E2;
        --ink-soft: #AEB4BE;
        --ink-faint: #A5ABB4;
        --line: #2A2F38;
        --line-soft: #22262E;
        --seal: #7FC59A;
        --seal-soft: #1D3327;
        --navy: #9FB0D4;
        --navy-soft: #242B39;
        --sel: #232833;
        --shadow: 0 1px 2px rgba(0,0,0,.2), 0 10px 30px rgba(0,0,0,.28);
      }
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans CJK KR", sans-serif;
      font-size: 16px;
      line-height: 1.72;
      letter-spacing: -.01em;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body.nav-open {
      overflow: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input {
      font: inherit;
    }

    button {
      color: inherit;
    }

    :focus-visible {
      outline: 2px solid var(--seal);
      outline-offset: 2px;
    }

    .skip-link {
      position: fixed;
      z-index: 80;
      top: var(--space-3);
      left: var(--space-3);
      transform: translateY(-72px);
      border: 1px solid var(--line);
      border-radius: 9px;
      background: var(--paper);
      color: var(--ink);
      box-shadow: var(--shadow);
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 800;
      transition: transform .15s ease;
    }

    .skip-link:focus {
      transform: translateY(0);
    }

    ::selection {
      background: var(--seal-soft);
    }

    .app {
      display: grid;
      grid-template-columns: 300px 1fr;
      min-height: 100dvh;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100dvh;
      overflow-y: auto;
      background: var(--sidebar);
      border-right: 1px solid var(--line);
      padding: var(--space-8) var(--space-5);
    }

    .brand {
      padding: 0 var(--space-2) var(--space-6);
      border-bottom: 1px solid var(--line);
      margin-bottom: var(--space-5);
    }

    .brand .kicker {
      color: var(--navy);
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: .28em;
      text-transform: uppercase;
    }

    .brand h1 {
      margin: var(--space-2) 0 var(--space-3);
      font-size: 22px;
      line-height: 1.24;
      letter-spacing: -.035em;
    }

    .brand h1 b {
      color: var(--seal);
    }

    .brand .sub {
      margin: 0;
      color: var(--ink-soft);
      font-size: 12.5px;
      line-height: 1.58;
    }

    .brand .author {
      margin: 7px 0 0;
      color: var(--ink-faint);
      font-size: 12.5px;
      font-weight: 800;
    }

    .tools {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: var(--space-2);
      margin: 0 0 var(--space-5);
    }

    .search-wrap {
      position: relative;
    }

    .resource-stack {
      display: grid;
      gap: var(--space-2);
      margin: calc(var(--space-5) * -1 + var(--space-2)) 0 var(--space-5);
    }

    .resource-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      border: 1px solid var(--line);
      border-radius: 9px;
      background: var(--paper);
      color: var(--ink);
      padding: 10px 11px;
      box-shadow: var(--shadow);
      font-size: 13px;
      font-weight: 800;
    }

    .resource-link small {
      display: block;
      color: var(--ink-faint);
      font-size: 11px;
      font-weight: 700;
    }

    .resource-link:hover {
      background: var(--sel);
    }

    .resource-link.active {
      border-color: var(--seal);
      background: var(--seal-soft);
      color: var(--seal);
    }

    .search-icon {
      position: absolute;
      left: 11px;
      top: 50%;
      color: var(--ink-faint);
      font-size: 15px;
      line-height: 1;
      transform: translateY(-50%);
      pointer-events: none;
    }

    .search-icon::before {
      content: "⌕";
    }

    #search {
      width: 100%;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: var(--paper);
      color: var(--ink);
      padding: 0 34px 0 32px;
    }

    #search::placeholder {
      color: var(--ink-faint);
    }

    #search::-webkit-search-cancel-button,
    #search::-webkit-search-decoration {
      appearance: none;
      -webkit-appearance: none;
    }

    #search:focus {
      border-color: var(--seal);
    }

    .search-clear {
      position: absolute;
      right: 6px;
      top: 50%;
      width: 22px;
      height: 22px;
      border: 0;
      border-radius: 6px;
      background: var(--sel);
      color: var(--ink-soft);
      cursor: pointer;
      display: grid;
      padding: 0;
      place-items: center;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-50%);
      transition: opacity .15s ease, color .15s ease;
    }

    .search-wrap.has-query .search-clear {
      opacity: 1;
      pointer-events: auto;
    }

    .search-clear:hover {
      color: var(--ink);
    }

    .search-clear::before {
      display: block;
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
      content: "✕";
    }

    .theme-toggle,
    .menu-toggle,
    .close-search {
      border: 1px solid var(--line);
      background: var(--paper);
      border-radius: 9px;
      min-width: 40px;
      height: 40px;
      display: inline-grid;
      place-items: center;
      cursor: pointer;
      transition: background-color .15s ease, border-color .15s ease, transform .15s ease;
    }

    .theme-toggle:hover,
    .menu-toggle:hover,
    .close-search:hover {
      background: var(--sel);
      border-color: color-mix(in srgb, var(--navy) 24%, var(--line));
    }

    .theme-toggle:active,
    .menu-toggle:active,
    .close-search:active {
      transform: translateY(1px);
    }

    .theme-glyph {
      display: block;
      color: var(--ink);
      font-size: 13px;
      line-height: 1;
    }

    .theme-glyph::before {
      content: "◐";
    }

    .menu-lines,
    .menu-lines::before,
    .menu-lines::after {
      display: block;
      width: 18px;
      height: 2px;
      border-radius: 999px;
      background: var(--navy);
      content: "";
    }

    .menu-lines {
      position: relative;
    }

    .menu-lines::before,
    .menu-lines::after {
      position: absolute;
      left: 0;
    }

    .menu-lines::before {
      top: -6px;
    }

    .menu-lines::after {
      top: 6px;
    }

    .sresults {
      display: none;
      margin-bottom: var(--space-5);
      padding: var(--space-3);
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--paper);
      box-shadow: var(--shadow);
    }

    .sresults.open {
      display: block;
    }

    .sresult {
      display: block;
      padding: 10px;
      border-radius: 8px;
      color: var(--ink-soft);
      font-size: 12.5px;
      line-height: 1.52;
    }

    .sresult:hover {
      background: var(--sel);
    }

    .sresult b {
      display: block;
      color: var(--ink);
      font-size: 13px;
      line-height: 1.4;
      margin-bottom: 3px;
    }

    mark {
      color: var(--seal);
      background: var(--seal-soft);
      border-radius: 4px;
      padding: 0 2px;
    }

    .part {
      margin: var(--space-6) 0 var(--space-3);
    }

    .part:first-of-type {
      margin-top: 0;
    }

    .part-toggle {
      display: grid;
      width: 100%;
      gap: 2px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      padding: 6px var(--space-2);
      margin-bottom: var(--space-2);
      cursor: pointer;
      text-align: left;
    }

    .part-toggle:hover {
      background: var(--sel);
    }

    .part-toggle .pnum {
      color: var(--seal);
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: .16em;
      text-transform: uppercase;
    }

    .part-toggle .pt {
      color: var(--ink-soft);
      font-size: 12px;
      font-weight: 700;
    }

    .part-toggle .pt::after {
      color: var(--ink-faint);
      content: " 접기";
      font-size: 11px;
      font-weight: 700;
    }

    .part.collapsed .part-toggle .pt::after {
      content: " 펼치기";
    }

    .part.collapsed .part-chapters {
      display: none;
    }

    .navlink {
      display: flex;
      align-items: flex-start;
      gap: var(--space-2);
      min-height: 34px;
      padding: 8px;
      border-radius: 8px;
      color: var(--ink-soft);
      font-size: 13px;
      line-height: 1.42;
      transition: background-color .15s ease, color .15s ease;
    }

    .navlink:hover {
      background: var(--sel);
      color: var(--ink);
    }

    .navlink.active {
      background: var(--sel);
      color: var(--ink);
      font-weight: 700;
    }

    .navlink .cnum {
      min-width: 2.6em;
      color: var(--ink-faint);
      flex: 0 0 auto;
      font-variant-numeric: tabular-nums;
      font-weight: 700;
      white-space: nowrap;
    }

    .navlink.active .cnum {
      color: var(--seal);
    }

    .main {
      min-width: 0;
    }

    .main-inner {
      width: min(100%, 824px);
      margin: 0 auto;
      padding: var(--space-10) var(--space-8) 88px;
    }

    .topbar {
      display: none;
      position: sticky;
      top: 0;
      z-index: 20;
      height: 56px;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--space-4);
      border-bottom: 1px solid var(--line);
      background: color-mix(in srgb, var(--bg) 88%, transparent);
      backdrop-filter: saturate(1.4) blur(8px);
    }

    .topbar-title {
      min-width: 0;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: -.02em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .backdrop {
      display: none;
    }

    .doc-head {
      padding-bottom: var(--space-8);
      border-bottom: 1px solid var(--line);
      margin-bottom: var(--space-8);
    }

    .chno {
      color: var(--seal);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .08em;
      margin-bottom: var(--space-2);
      font-variant-numeric: tabular-nums;
    }

    .doc-head h2 {
      margin: 0;
      color: var(--ink);
      font-size: clamp(24px, 4.5vw, 32px);
      font-weight: 800;
      letter-spacing: -.035em;
      line-height: 1.28;
      text-wrap: balance;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      margin-top: var(--space-4);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 11.5px;
      font-weight: 700;
      line-height: 1;
    }

    .badge.case {
      color: var(--seal);
      background: var(--seal-soft);
    }

    .badge.scen {
      color: var(--navy);
      background: var(--navy-soft);
    }

    .badge.status {
      color: var(--ink-soft);
      border: 1px solid var(--line);
      background: transparent;
    }

    .prose {
      max-width: 760px;
    }

    .prose:focus {
      outline: none;
    }

    .prose p {
      margin: 0 0 18px;
    }

    .lead {
      color: var(--ink-soft);
      font-size: 16.5px;
    }

    .prose h3 {
      margin: 38px 0 14px;
      font-size: 20px;
      line-height: 1.42;
      letter-spacing: -.025em;
    }

    .prose h4 {
      margin: 26px 0 10px;
      font-size: 16px;
      line-height: 1.5;
      letter-spacing: -.02em;
    }

    .prose strong,
    .prose b {
      font-weight: 800;
    }

    .prose em {
      color: var(--seal);
      font-style: normal;
      font-weight: 700;
    }

    .prose a.ref {
      color: var(--navy);
      text-decoration-line: underline;
      text-decoration-color: color-mix(in srgb, var(--navy) 40%, transparent);
      text-underline-offset: 3px;
    }

    .callout {
      margin: var(--space-6) 0;
      border-left: 3px solid var(--seal);
      border-radius: 0 12px 12px 0;
      background: var(--seal-soft);
      color: var(--ink);
      padding: var(--space-4) var(--space-5);
      font-weight: 700;
    }

    .box {
      margin: var(--space-6) 0;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--paper);
      box-shadow: var(--shadow);
      padding: var(--space-5);
      font-size: 15px;
      line-height: 1.66;
    }

    .box p:last-child,
    .box ul:last-child,
    .keytake ul:last-child {
      margin-bottom: 0;
    }

    .box.case {
      border-color: color-mix(in srgb, var(--seal) 30%, var(--line));
    }

    .box.scen,
    .box.tip {
      border-color: color-mix(in srgb, var(--navy) 30%, var(--line));
    }

    .box.warn {
      border-left: 3px solid var(--seal);
    }

    .box.law {
      background: var(--line-soft);
      color: var(--ink-soft);
      font-size: 14px;
    }

    .box-label {
      margin-bottom: var(--space-2);
      font-size: 11.5px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .box.case .box-label,
    .box.warn .box-label {
      color: var(--seal);
    }

    .box.scen .box-label,
    .box.tip .box-label {
      color: var(--navy);
    }

    .audio-card {
      margin: var(--space-6) 0;
      border: 1px solid color-mix(in srgb, var(--navy) 30%, var(--line));
      border-radius: 12px;
      background: var(--paper);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .audio-card-head {
      padding: var(--space-4) var(--space-5);
      border-bottom: 1px solid var(--line);
      background: var(--navy-soft);
    }

    .audio-card .box-label {
      color: var(--navy);
    }

    .audio-title {
      color: var(--ink);
      font-size: 15px;
      font-weight: 800;
      line-height: 1.45;
    }

    .audio-meta {
      margin: 4px 0 0;
      color: var(--ink-soft);
      font-size: 12.5px;
      line-height: 1.5;
    }

    .audio-card audio {
      display: block;
      width: calc(100% - 40px);
      margin: var(--space-4) var(--space-5);
    }

    .audio-script {
      border-top: 1px solid var(--line);
      padding: var(--space-3) var(--space-5) var(--space-4);
      color: var(--ink-soft);
      font-size: 14px;
    }

    .audio-script summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      min-height: 34px;
      margin: 0 calc(var(--space-2) * -1);
      border-radius: 8px;
      padding: 6px var(--space-2);
      cursor: pointer;
      color: var(--navy);
      font-weight: 800;
      list-style: none;
      transition: background .15s ease;
    }

    .audio-script summary:hover {
      background: color-mix(in srgb, var(--navy-soft) 58%, transparent);
    }

    .audio-script summary::-webkit-details-marker {
      display: none;
    }

    .audio-script-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .audio-script-toggle::before {
      content: "";
      flex: 0 0 auto;
      width: 6px;
      height: 6px;
      border-right: 2px solid currentColor;
      border-bottom: 2px solid currentColor;
      transform: rotate(-45deg);
      transition: transform .15s ease;
    }

    .audio-script[open] .audio-script-toggle::before {
      transform: rotate(45deg);
    }

    .audio-script-state {
      flex: 0 0 auto;
      border: 1px solid color-mix(in srgb, var(--navy) 24%, var(--line));
      border-radius: 999px;
      background: var(--paper);
      color: var(--ink-soft);
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 800;
      line-height: 1.45;
    }

    .audio-script-state::before {
      content: "열기";
    }

    .audio-script[open] .audio-script-state::before {
      content: "접기";
    }

    .audio-transcript {
      margin: var(--space-3) 0 0;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: var(--line-soft);
      color: var(--ink);
      padding: var(--space-4);
      font-family: "Hiragino Sans", "Yu Gothic", "Noto Sans CJK JP", "Noto Sans KR", sans-serif;
      line-height: 1.85;
    }

    .audio-transcript-line {
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
    }

    .audio-transcript-line + .audio-transcript-line {
      margin-top: 4px;
    }

    .audio-speaker {
      color: var(--navy);
      font-weight: 800;
      white-space: nowrap;
    }

    .audio-utterance {
      color: var(--ink);
      line-break: strict;
      word-break: normal;
      overflow-wrap: normal;
    }

    .vocab-box {
      margin: var(--space-8) 0;
      border: 1px solid color-mix(in srgb, var(--seal) 28%, var(--line));
      border-radius: 12px;
      background: var(--paper);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .vocab-box-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      padding: var(--space-4) var(--space-5);
      border-bottom: 1px solid var(--line);
      background: var(--seal-soft);
    }

    .vocab-box-title {
      color: var(--seal);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .vocab-box-link {
      color: var(--seal);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .vocab-mini {
      width: 100%;
      border-collapse: collapse;
      min-width: 0;
      font-size: 14px;
    }

    .vocab-mini td {
      padding: 11px 14px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
    }

    .vocab-mini tr:last-child td {
      border-bottom: 0;
    }

    .vocab-mini b {
      display: block;
      color: var(--ink);
      font-size: 16px;
      line-height: 1.35;
    }

    .vocab-mini small {
      color: var(--ink-faint);
      font-weight: 700;
    }

    .check,
    .sources ul,
    .keytake ul {
      padding-left: 0;
      list-style: none;
    }

    .check li {
      position: relative;
      padding-left: 26px;
      margin-bottom: 10px;

      <p class="lead">한국어 화자에게 일본어는 낯설면서도 이상하게 익숙한 언어다. 어순과 조사, 한자어는 큰 지렛대가 되지만 발음, 한자 읽기, 경어는 끝까지 발목을 잡기 쉽다.</p>
      <p>이 책은 그 차이를 처음부터 드러내 놓고 학습 순서를 잡는다. 빠르게 외울 수 있는 것은 빠르게 넘기고, 한국인이 오래 틀리는 부분은 반복 훈련으로 다룬다.</p>
      <div class="callout">목표는 단순한 문법 암기가 아니라 <b>24-30개월 안에 JLPT N1 지문과 청해를 버틸 수 있는 학습 체력</b>을 만드는 것이다.</div>

      <h3>0.1 한국어와 일본어, 무엇이 같고 무엇이 다른가</h3>
      <p>두 언어는 기본 어순이 비슷하다. "나는 밥을 먹는다"를 일본어로 옮기면 <em>私は ご飯を 食べます</em>처럼 주어, 목적어, 동사의 큰 순서가 유지된다. 이 덕분에 영어식 어순을 새로 익히는 부담이 적다.</p>
      <p>하지만 비슷함은 함정도 만든다. は와 が를 한국어의 은/는, 이/가로만 이해하면 초반에는 편하지만 중급부터는 주제와 초점의 차이를 놓치게 된다. 한자어도 마찬가지다. 의미가 비슷한 단어가 많지만 읽기와 뉘앙스는 별도로 익혀야 한다.</p>
      <div class="table-wrap"><table class="glossary">
        <thead><tr><th>영역</th><th>한국어 화자의 이점</th><th>주의할 차이</th></tr></thead>
        <tbody>
          <tr><td>어순</td><td>문장 뼈대가 비슷해 직관적으로 배열할 수 있다.</td><td>수식절과 문장 끝 표현이 길어질수록 호흡이 달라진다.</td></tr>
          <tr><td>조사</td><td>은/는, 이/가, 을/를과 대응시켜 출발할 수 있다.</td><td>は와 が, に와 で는 한국어 대응만으로 해결되지 않는다.</td></tr>
          <tr><td>한자어</td><td>学校, 家族, 文化처럼 의미 추측이 쉽다.</td><td>음독, 훈독, 신자체, 뜻이 다른 한자어를 따로 관리해야 한다.</td></tr>
          <tr><td>발음</td><td>모음 수가 적어 처음 진입은 빠르다.</td><td>장음, 촉음, ん, つ 같은 박자와 조음 차이가 누적된다.</td></tr>
        </tbody>
        <caption>한국어 화자가 일본어를 배울 때 활용할 수 있는 지렛대와 초반 함정.</caption>
      </table></div>

      <h3>0.2 JLPT 시험 구조 한눈에 보기</h3>
      <p>JLPT는 N5에서 N1까지 올라간다. 이 책은 N1을 최종 목표로 하되, N2를 실전 독해와 청해의 중간 관문으로 둔다. 초급에서 문장 뼈대가 흔들리면 N3 이후 독해와 청해가 급격히 무거워지고, N2에서 논리 읽기가 약하면 N1의 추상 지문을 버티기 어렵다.</p>
      <ol class="steps">
        <li><b>N5</b>: 문자, 발음, 기본 조사, ます형과 て형을 고정한다.</li>
        <li><b>N4</b>: 보통체, 인용, 수수 표현, 가능과 조건을 익힌다.</li>
        <li><b>N3</b>: 자타 동사, 수동과 사역, 추측 표현으로 중급 문장을 읽는다.</li>
        <li><b>N2</b>: 기능어 문형, 문어체, 긴 독해와 실제 속도의 청해를 훈련한다.</li>
        <li><b>N1</b>: 추상어, 논설문, 함축 청해, 고급 문어체를 실제 자료로 버틴다.</li>
      </ol>
      <div class="table-wrap"><table>
        <thead><tr><th>급수</th><th>공식 시험 교시</th><th>시험 시간</th><th>합격 판단</th></tr></thead>
        <tbody>
          <tr><td>N1</td><td>언어지식(문자·어휘·문법)+독해 / 청해</td><td>110분 / 55분</td><td>총점 100점 이상, 각 영역 19점 이상</td></tr>
          <tr><td>N2</td><td>언어지식(문자·어휘·문법)+독해 / 청해</td><td>105분 / 50분</td><td>총점 90점 이상, 각 영역 19점 이상</td></tr>
          <tr><td>N3</td><td>문자·어휘 / 문법+독해 / 청해</td><td>30분 / 70분 / 40분</td><td>총점 95점 이상, 각 영역 19점 이상</td></tr>
          <tr><td>N4</td><td>문자·어휘 / 문법+독해 / 청해</td><td>25분 / 55분 / 35분</td><td>총점 90점 이상, 언어지식+독해 38점, 청해 19점 이상</td></tr>
          <tr><td>N5</td><td>문자·어휘 / 문법+독해 / 청해</td><td>20분 / 40분 / 30분</td><td>총점 80점 이상, 언어지식+독해 38점, 청해 19점 이상</td></tr>
        </tbody>
        <caption>JLPT 공식 기준의 교시 구성과 시간. 실제 점수는 원점수 단순 합산이 아니라 환산 점수로 통지된다.</caption>
      </table></div>
      <div class="box law">
        <div class="box-label">시험 일정 확인</div>
        <p>JLPT는 보통 7월과 12월에 시행된다. 2026년 공식 일정은 1회 시험 2026년 7월 5일, 2회 시험 2026년 12월 6일이다. 해외 시험장은 도시별로 7월 또는 12월 중 한 번만 열릴 수 있으므로, 접수 전에는 반드시 본인 도시의 실시 기관 일정을 확인한다.</p>
      </div>

      <h3>0.3 전체 로드맵</h3>
      <p>권장 흐름은 N5 3개월, N4 3개월, N3 4개월, N2 6개월, N1 8-12개월이다. 하루 30분이면 30개월에 가깝고, 하루 1-2시간을 꾸준히 확보하면 24개월 안팎도 가능하다.</p>
      <div class="box tip">
        <div class="box-label">학습 팁</div>
        <p>기간보다 중요한 것은 끊기지 않는 루틴이다. 문자와 발음은 몰아서 끝내고, 문법과 어휘는 매일 조금씩 누적한다. 청해는 늦게 시작하지 말고 N5 단계부터 짧게라도 귀를 열어 둔다.</p>
      </div>

      <h3>0.4 학습 도구 세팅</h3>
      <ul class="check">
        <li>일본어 입력기를 설치하고 히라가나 입력을 직접 해 본다.</li>
        <li>사전 앱 하나를 정한다. 예문과 악센트 정보를 함께 볼 수 있으면 좋다.</li>
        <li>Anki 같은 간격 반복 단어장을 준비하되, 처음부터 덱을 너무 많이 넣지 않는다.</li>
        <li>매일 들을 5-10분짜리 쉬운 음성 자료를 하나 고른다.</li>
      </ul>

      <h3>0.5 이 책의 사용법</h3>
      <p>각 장은 도입 설명, 핵심 비교, 실전 함정, 확인 질문 순서로 읽도록 설계한다. 처음 읽을 때는 이해를 우선하고, 두 번째 읽을 때 예문을 소리 내어 따라 읽는다.</p>
      <div class="table-wrap"><table>
        <thead><tr><th>하루 시간</th><th>권장 루틴</th><th>끝낼 기준</th></tr></thead>

      <h3>2.3 헷갈리는 가타카나 묶음</h3>
      <p>가타카나는 직선이 많아서 비슷한 글자가 많다. 특히 シ/ツ, ン/ソ는 입문자가 가장 자주 틀린다. 획의 방향과 기울기를 같이 봐야 한다.</p>
      <div class="table-wrap"><table>

        </tbody>
        <caption>비슷한 가타카나는 단독 암기보다 단어 속에서 묶어 보는 편이 빠르다.</caption>
      </table></div>

      <h3>2.4 외래어 표기 규칙</h3>
      <p>가타카나 외래어는 영어 발음을 그대로 옮긴 것이 아니라 일본어의 박자 체계에 맞게 바꾼 말이다. 받침이 거의 없기 때문에 자음 뒤에 모음이 붙고, 긴 모음은 장음 부호 ー로 표시된다.</p>
      <div class="table-wrap"><table class="glossary">
        <thead><tr><th>가타카나</th><th>원어 감각</th><th>한국어 뜻</th><th>포인트</th></tr></thead>
        <tbody>
          <tr><td>コーヒー</td><td>coffee</td><td>커피</td><td>長音 ー가 두 번 들어간다.</td></tr>
          <tr><td>バス</td><td>bus</td><td>버스</td><td>끝 자음이 ス로 열린다.</td></tr>
          <tr><td>ホテル</td><td>hotel</td><td>호텔</td><td>ho-te-ru 세 박자로 읽는다.</td></tr>
          <tr><td>コンピューター</td><td>computer</td><td>컴퓨터</td><td>ピュー와 ター의 장음을 확인한다.</td></tr>
          <tr><td>チョコレート</td><td>chocolate</td><td>초콜릿</td><td>チョ는 한 박자, レー는 장음이다.</td></tr>
          <tr><td>アイスクリーム</td><td>ice cream</td><td>아이스크림</td><td>단어가 길어져도 박자로 나눠 읽는다.</td></tr>
        </tbody>
        <caption>외래어는 원어 철자보다 일본어 박자와 장음 위치가 중요하다.</caption>
      </table></div>

      <div class="box warn">
        <div class="box-label">주의</div>
        <p>영어를 잘 알아도 가타카나를 자동으로 읽을 수 있는 것은 아니다. マクドナルド, ミルクティー, スマートフォン처럼 일본어 안에서 새 단어가 된 형태를 그대로 익혀야 한다.</p>
      </div>

      <h3>2.5 편의점 진열대 해독 루틴</h3>

      <div class="keytake"><div class="kt-label">이 장의 핵심</div><ul>
        <li>가타카나는 히라가나와 같은 소리 체계지만 외래어와 실제 상품명에서 특히 많이 쓰인다.</li>

    CONTENT.ch04 = `
      <p class="lead">일본어 문장은 처음부터 길게 만들 필요가 없다. N5 단계의 목표는 <em>명사 + 조사 + 서술어</em>라는 뼈대를 안정적으로 세우는 것이다.</p>
      <p>한국어와 일본어는 어순이 비슷해서 출발이 빠르다. 하지만 조사를 한국어와 1:1로만 맞추면 は와 が, に와 で에서 바로 막힌다. 이 장은 문장을 직접 만드는 최소 규칙을 먼저 잡는다.</p>

      <h3>4.1 명사문: です / じゃありません</h3>
      <p>명사문은 A가 B임을 말하는 문장이다. 가장 기본형은 <em>AはBです</em>다. 부정은 <em>Bじゃありません</em>으로 만든다. 더 격식 있는 부정형으로 <em>ではありません</em>도 쓴다.</p>
      <div class="table-wrap"><table>
        <thead><tr><th>형태</th><th>일본어</th><th>뜻</th><th>구조</th></tr></thead>
        <tbody>
          <tr><td>긍정</td><td>私は学生です。</td><td>저는 학생입니다.</td><td>私 + は + 学生 + です</td></tr>
          <tr><td>부정</td><td>私は学生じゃありません。</td><td>저는 학생이 아닙니다.</td><td>学生 + じゃありません</td></tr>
          <tr><td>질문</td><td>田中さんは先生ですか。</td><td>다나카 씨는 선생님입니까?</td><td>문장 끝에 か</td></tr>
          <tr><td>대답</td><td>はい、先生です。</td><td>네, 선생님입니다.</td><td>반복되는 주제 생략 가능</td></tr>
        </tbody>
        <caption>명사문은 N5 회화와 독해의 첫 문장 틀이다.</caption>
      </table></div>
      <div class="box warn">
        <div class="box-label">주의</div>
        <p>です는 한국어의 "입니다"에 가깝지만, 항상 존댓말 느낌만 뜻하지는 않는다. 초급에서는 정중한 기본 문장 끝이라고 이해하면 충분하다.</p>
      </div>

      <h3>4.2 조사 기초: は・が・を・に・で・へ・と・も</h3>
      <p>조사는 단어 뒤에 붙어 문장 안의 역할을 표시한다. 한국어 조사와 비슷한 부분이 많지만, 일본어 조사는 문장의 초점과 정보 흐름까지 표시한다.</p>
      <div class="table-wrap"><table class="glossary">
        <thead><tr><th>조사</th><th>기본 역할</th><th>예문</th><th>한국어 감각</th></tr></thead>
        <tbody>
          <tr><td>は</td><td>주제</td><td>私は学生です。</td><td>은/는</td></tr>
          <tr><td>が</td><td>주어, 초점</td><td>犬がいます。</td><td>이/가</td></tr>
          <tr><td>を</td><td>목적어</td><td>水を飲みます。</td><td>을/를</td></tr>
          <tr><td>に</td><td>도착점, 시간, 존재 위치</td><td>学校に行きます。</td><td>에</td></tr>
          <tr><td>で</td><td>동작 장소, 수단</td><td>駅で会います。</td><td>에서, 로</td></tr>
          <tr><td>へ</td><td>방향</td><td>日本へ行きます。</td><td>에, 로</td></tr>
          <tr><td>と</td><td>함께, 인용</td><td>友だちと行きます。</td><td>와/과</td></tr>
          <tr><td>も</td><td>도</td><td>私も行きます。</td><td>도</td></tr>
        </tbody>
        <caption>초급에서는 한 조사에 뜻 하나를 붙이되, 예문 속 역할로 다시 확인한다.</caption>
      </table></div>

      <h3>4.3 は와 が: 은/는 vs 이/가로 출발하되 거기서 멈추지 않기</h3>
      <p>は는 이미 말하려는 주제를 세운다. が는 새로 등장한 정보나 초점을 세운다. 한국어 은/는, 이/가와 비슷해서 출발점으로 좋지만, 일본어에서는 대조와 초점의 차이가 더 중요하다.</p>
      <div class="table-wrap"><table>
        <thead><tr><th>문장</th><th>느낌</th><th>언제 쓰나</th></tr></thead>
        <tbody>
          <tr><td>私は学生です。</td><td>나에 대해 말하자면 학생이다.</td><td>자기소개, 주제 제시</td></tr>
          <tr><td>私が学生です。</td><td>학생인 사람은 바로 나다.</td><td>누가 학생인지 묻는 상황</td></tr>
          <tr><td>日本語は難しいです。</td><td>일본어라는 주제는 어렵다.</td><td>일반적인 의견</td></tr>
          <tr><td>日本語が難しいです。</td><td>어려운 것은 일본어다.</td><td>여러 과목 중 초점</td></tr>
        </tbody>
      </table></div>
      <div class="box tip">
        <div class="box-label">판단법</div>
        <p>"무엇에 대해 말하는가?"라면 は, "무엇이 바로 답인가?"라면 が를 먼저 의심한다. 완벽한 규칙은 아니지만 초급 판단에는 충분히 강력하다.</p>
      </div>

      <h3>4.4 지시어 こ・そ・あ・ど</h3>
      <p>지시어는 사물과 위치를 가리키는 말이다. こ는 말하는 사람 가까이, そ는 듣는 사람 가까이 또는 방금 나온 내용, あ는 둘 모두에게서 먼 것, ど는 질문이다.</p>
      <div class="table-wrap"><table>
        <thead><tr><th>계열</th><th>사물</th><th>장소</th><th>방향/쪽</th><th>뜻</th></tr></thead>
        <tbody>
          <tr><td>こ</td><td>これ</td><td>ここ</td><td>こちら</td><td>이것, 여기, 이쪽</td></tr>
          <tr><td>そ</td><td>それ</td><td>そこ</td><td>そちら</td><td>그것, 거기, 그쪽</td></tr>
          <tr><td>あ</td><td>あれ</td><td>あそこ</td><td>あちら</td><td>저것, 저기, 저쪽</td></tr>
          <tr><td>ど</td><td>どれ</td><td>どこ</td><td>どちら</td><td>어느 것, 어디, 어느 쪽</td></tr>
        </tbody>
      </table></div>

      <h3>4.5 의문문과 조수사</h3>
      <p>정중체 의문문은 문장 끝에 か를 붙이면 된다. 억양만 올리는 한국어와 달리, 초급 문장에서는 か가 질문 표시 역할을 한다. 숫자를 셀 때는 대상에 따라 조수사가 붙는다.</p>
      <div class="table-wrap"><table>
        <thead><tr><th>질문</th><th>뜻</th><th>대답 예</th></tr></thead>
        <tbody>
          <tr><td>これは何ですか。</td><td>이것은 무엇입니까?</td><td>本です。</td></tr>
          <tr><td>トイレはどこですか。</td><td>화장실은 어디입니까?</td><td>あそこです。</td></tr>
          <tr><td>今、何時ですか。</td><td>지금 몇 시입니까?</td><td>三時です。</td></tr>
          <tr><td>りんごはいくつありますか。</td><td>사과는 몇 개 있습니까?</td><td>二つあります。</td></tr>
        </tbody>
      </table></div>

      <h3>연습문제</h3>
      <ol class="steps">
        <li><b>저는 학생입니다.</b>를 일본어로 써 보라.</li>
        <li><b>이것은 책이 아닙니다.</b>를 일본어로 써 보라.</li>
        <li><b>물을 마십니다.</b>에서 목적어 조사를 넣어 써 보라.</li>
        <li><b>역에서 친구와 만납니다.</b>에서 장소와 함께의 조사를 넣어 써 보라.</li>
        <li><b>화장실은 어디입니까?</b>를 일본어로 써 보라.</li>
      </ol>
      <div class="box case">
        <div class="box-label">정답</div>
        <p>1. 私は学生です。 2. これは本じゃありません。 3. 水を飲みます。 4. 駅で友だちと会います。 5. トイレはどこですか。</p>
      </div>

      <div class="keytake"><div class="kt-label">이 장의 핵심</div><ul>
        <li>명사문은 AはBです, 부정은 Bじゃありません으로 시작한다.</li>
        <li>조사는 단어의 역할을 표시하며, は와 が는 주제와 초점의 차이를 만든다.</li>
        <li>こ・そ・あ・ど와 か 의문문만 익혀도 자기소개와 길 묻기의 뼈대가 생긴다.</li>
      </ul></div>
    `;

    CONTENT.ch05 = `
      <p class="lead">일본어에서 문장의 움직임은 동사가 만든다. N5에서 가장 중요한 일은 동사를 3그룹으로 나누고, ます형·て형·ない형·た형·사전형을 눈으로 보고 바로 바꾸는 것이다.</p>
      <p>활용은 처음에는 복잡해 보이지만 규칙의 수가 많지 않다. 이 장에서는 자주 쓰는 동사를 표로 고정하고, 부탁·허가·금지를 만드는 て형 문장까지 연결한다.</p>

      <h3>5.1 동사 3그룹 분류법</h3>

      <p>ます형은 정중체의 기본이다. 회화 초반에는 ます형만 안정적으로 써도 문장을 많이 만들 수 있다. 부정은 ません, 과거는 ました, 과거 부정은 ませんでした다.</p>

    function chapter(id, num, title, subs) {
      return { id: id, num: num, title: title, tags: ["학습"], subs: subs };

    }

    function appendix(id, num, title) {
      return { id: id, num: "부록 " + num, title: title, tags: ["부록"], subs: ["표와 색인 형태로 정리할 항목", "원고 작성 시 검색 가능한 참조 자료로 구성"] };
    }

    var chapters = BOOK.reduce(function (acc, part) {
      return acc.concat(part.chapters);
    }, []);

    function escapeHTML(value) {
      return value.replace(/[&<>"']/g, function (char) {
        return { "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" }[char];
      });
    }

    function stripHTML(value) {
      var div = document.createElement("div");
      div.innerHTML = value || "";
      return div.textContent || div.innerText || "";
    }

    function getChapter(id) {
      return chapters.find(function (item) { return item.id === id; }) || chapters[0];
    }

    function chapterLabel(ch) {
      var prefix = ch.num + " ";
      return ch.title.indexOf(prefix) === 0 ? ch.title : prefix + ch.title;
    }

    var navPartStateKey = "jgb-book-nav-parts";
    var openParts = {};

    function readOpenParts() {
      try {
        return JSON.parse(localStorage.getItem(navPartStateKey) || "{}") || {};
      } catch (error) {
        return {};
      }
    }

    function writeOpenParts() {
      try {
        localStorage.setItem(navPartStateKey, JSON.stringify(openParts));
      } catch (error) {
        return false;
      }
      return true;
    }

    function partIdForChapter(id) {
      var found = BOOK.find(function (part) {
        return part.chapters.some(function (ch) { return ch.id === id; });
      });
      return found ? found.id : BOOK[0].id;
    }

    function renderNav() {
      var nav = document.getElementById("bookNav");
      var currentId = getChapter(location.hash.replace("#", "") || "ch00").id;
      var currentPartId = partIdForChapter(currentId);
      var savedParts = readOpenParts();
      var hasSavedParts = Object.keys(savedParts).length > 0;
      openParts = hasSavedParts ? savedParts : {};
      nav.innerHTML = BOOK.map(function (part) {
        var isOpen = hasSavedParts ? openParts[part.id] !== false : part.id === currentPartId;
        openParts[part.id] = isOpen;
        return '<section class="part' + (isOpen ? "" : " collapsed") + '" data-part="' + part.id + '">' +
          '<button class="part-toggle" type="button" aria-expanded="' + String(isOpen) + '" data-part="' + part.id + '"><span class="pnum">' +
          escapeHTML(part.num) + '</span><span class="pt">' + escapeHTML(part.title) +
          '</span></button><div class="part-chapters">' + part.chapters.map(function (ch) {
            return '<a class="navlink" href="#' + ch.id + '" data-id="' + ch.id +
              '"><span class="cnum">' + escapeHTML(ch.num) + '</span><span>' +
              escapeHTML(ch.title) + '</span></a>';
          }).join("") + '</div></section>';
      }).join("");
      writeOpenParts();
    }

    function cleanTopic(topic) {
      return topic.replace(/^[0-9]+(?:\.[0-9]+)?\s*/, "");
    }

    function containsAny(value, words) {
      return words.some(function (word) { return value.indexOf(word) > -1; });

      if (containsAny(text, ["시간·범위", "시간과 범위"])) return "시간과 범위 문형은 사건이 언제 시작되고 어디까지 이어지는지를 표시한다. 〜うちに는 기회가 사라지기 전의 시간 폭을, 〜にわたって는 넓게 이어지는 범위를 만든다. 독해에서는 기간 표현과 함께 묶어 읽는다.";
      if (containsAny(text, ["원인·이유", "원인과 이유"])) return "원인과 이유 문형은 단순한 because가 아니라 평가까지 함께 담는다. 〜おかげで는 좋은 결과, 〜せいで는 나쁜 결과와 어울린다. 같은 이유라도 말하는 사람의 태도가 달라지는 점을 확인한다.";
      if (containsAny(text, ["역접", "양보"])) return "역접과 양보는 앞 내용과 반대되는 결론을 만든다. N2 독해에서는 이 지점 뒤에 필자의 진짜 판단이 나오는 경우가 많다. 〜ものの, 〜にもかかわらず 같은 표현을 보면 앞뒤 주장을 화살표로 표시한다.";
      if (containsAny(text, ["기준", "관점"])) return "기준과 관점 문형은 누구에게, 무엇에 대해, 어떤 범위를 두고 말하는지 정한다. 〜にとって는 판단 주체를 세우고, 〜に対して는 대상과 방향을 만든다. 긴 문장에서 논점이 흔들릴 때 기준 표현을 먼저 찾는다.";
      if (containsAny(text, ["부정 계열", "ざるを得ない", "ずにはいられない"])) return "부정 계열 문형은 겉으로는 부정이지만 실제 뜻은 강한 필연이나 감정으로 바뀐다. 〜ざるを得ない는 선택지가 없어 할 수밖에 없다는 뜻이고, 〜ずにはいられない는 감정상 참을 수 없다는 뜻이다.";
      if (containsAny(text, ["유사 문형", "함정 페어"])) return "유사 문형은 뜻만 보면 비슷하지만 쓰이는 문맥이 다르다. 시험에서는 바로 이 차이를 묻는다. 앞말의 품사, 뒤에 오는 평가, 문어체인지 회화체인지까지 함께 비교해야 한다.";
      if (containsAny(text, ["문어체", "회화체", "書き言葉", "話し言葉"])) return "문어체는 기사, 설명문, 시험 지문에서 자주 보이고 회화체는 실제 대화와 드라마에서 강하게 나타난다. 같은 뜻이라도 문체가 다르면 자연스러움이 달라진다. 읽을 때는 격식의 높낮이까지 표시한다.";
      if (containsAny(text, ["N3", "N2", "문형", "기능어", "문어체", "뉘앙스"])) return "중급 이후에는 문형을 뜻 하나로 외우면 부족하다. 어떤 문체에서 자연스러운지, 앞뒤에 어떤 논리 관계를 만드는지, 비슷한 문형과 무엇이 다른지를 함께 익혀야 한다. 예문을 한 줄씩 분석하며 기능을 붙인다.";
      if (containsAny(text, ["문제 유형별 접근법", "단문", "중문", "장문", "통합", "정보검색"])) return "독해 문제 유형마다 읽는 순서가 다르다. 단문은 핵심 문장 하나를 정확히 읽고, 장문은 접속사와 결론 위치를 추적한다. 정보검색은 모든 문장을 정독하지 말고 조건에 맞는 숫자와 키워드를 먼저 찾는다.";
      if (containsAny(text, ["필자의 주장"])) return "필자의 주장은 보통 가장 강한 표현보다 조심스럽게 정리된 문장에 숨어 있다. 그러나, 즉, 따라서 같은 연결어 뒤를 확인하고, 예시는 주장 자체가 아니라 주장을 받치는 근거로 분리한다.";
      if (containsAny(text, ["시간 배분", "스킵 전략"])) return "시간 배분은 실력의 일부다. 모르는 단어 하나에 오래 머무르면 뒤의 쉬운 문제를 잃는다. 먼저 풀 문제와 넘길 문제의 기준을 정하고, 표시만 해 둔 뒤 마지막에 돌아오는 습관을 만든다.";
      if (containsAny(text, ["독해", "접속사", "지시어", "필자", "장문", "정보검색"])) return "독해는 단어를 많이 아는 것만으로 해결되지 않는다. 접속사로 논리 방향을 잡고, 지시어가 받는 내용을 되짚고, 마지막에 필자의 주장이 어디서 정리되는지 확인한다. 모르는 단어보다 문장 관계를 먼저 본다.";
      if (containsAny(text, ["과제이해", "포인트이해", "개요이해", "즉시응답", "통합이해", "문제 유형별 공략"])) return "청해 문제 유형을 먼저 보면 들어야 할 정보가 좁아진다. 과제이해는 행동을, 포인트이해는 특정 정보를, 개요이해는 전체 의도를 잡는다. 즉시응답은 문법보다 반응 속도와 관용 표현이 중요하다.";
      if (containsAny(text, ["축약형", "구어체", "ちゃう", "とく", "じゃん"])) return "축약형은 실제 속도의 일본어를 어렵게 만드는 핵심이다. 〜てしまう가 〜ちゃう로, 〜ておく이 〜とく으로 줄면 글자로 아는 표현도 귀에서 놓치기 쉽다. 스크립트를 보며 원래 형태로 되돌리는 연습을 한다.";
      if (containsAny(text, ["남성어", "여성어", "세대별 말투"])) return "말투는 뜻보다 관계와 분위기를 먼저 알려 준다. 남성어와 여성어는 고정된 규칙이라기보다 캐릭터, 세대, 상황에 따라 달라지는 선택지다. 애니 말투를 그대로 따라 하기보다 어떤 효과를 내는지 관찰한다.";
      if (containsAny(text, ["받아쓰기", "배속", "딕테이션", "쉐도잉"])) return "받아쓰기는 들리지 않는 부분을 정확히 드러내고, 쉐도잉은 문장의 호흡을 몸에 붙인다. 처음부터 빠르게 듣지 말고 정상 속도에서 구조를 잡은 뒤, 익숙한 자료만 배속으로 올린다.";
      if (containsAny(text, ["청해", "쉐도잉", "딕테이션", "축약형", "구어체", "말투"])) return "청해는 귀가 좋아지는 일이 아니라 예측 능력이 쌓이는 일이다. 먼저 문제 유형을 보고 들어야 할 정보를 정하고, 들은 뒤에는 스크립트로 놓친 축약과 말투를 확인한다. 짧은 자료를 여러 번 반복하는 편이 효과적이다.";
      if (containsAny(text, ["어휘", "부사", "관용구", "의성어", "의태어"])) return "어휘는 급수별 목록을 처음부터 끝까지 외우기보다 분야와 기능으로 묶는다. 한자어는 한국어 지식을 활용하고, 고유어와 부사, 의성어는 장면과 함께 외운다. 예문 없이 외운 단어는 독해에서 다시 낯설어진다.";
      if (containsAny(text, ["시험", "모의고사", "시간 배분", "마킹", "접수"])) return "시험 준비는 지식 추가보다 손실을 줄이는 단계다. 시간 배분, 마킹, 스킵 기준을 미리 정하고, 모의고사마다 틀린 이유를 문법·어휘·속도·집중력으로 분류한다. 마지막 4주는 새 교재보다 오답 회수가 중요하다.";
      return "이 절은 해당 장의 핵심 개념을 한국어 화자의 관점에서 정리한다. 먼저 한국어와 비슷한 부분을 확인하고, 곧바로 직역이 통하지 않는 차이를 분리한다. 마지막에는 짧은 일본어 예문을 소리 내어 읽으며 실제 운용 감각을 붙인다.";
    }

    function exampleTableFor(ch) {
      var rows = EXAMPLE_BANK[ch.id] || [
        [cleanTopic(ch.subs[0] || ch.title), ch.title, "핵심 개념을 실제 문장 안에서 확인한다."],
        [cleanTopic(ch.subs[1] || ch.title), "한국어 화자의 장점", "비슷함은 지렛대지만 직역은 항상 점검한다."],
        [cleanTopic(ch.subs[2] || ch.title), "반복 훈련", "소리 내어 읽고 짧은 문장으로 다시 만든다."]
      ];
      return '<div class="table-wrap"><table><thead><tr><th>일본어/항목</th><th>뜻 또는 역할</th><th>학습 포인트</th></tr></thead><tbody>' +
        rows.map(function (row) {
          return '<tr><td>' + escapeHTML(row[0]) + '</td><td>' + escapeHTML(row[1]) + '</td><td>' + escapeHTML(row[2]) + '</td></tr>';
        }).join("") + '</tbody><caption>' + escapeHTML(ch.num + " " + ch.title) + '에서 바로 확인할 예시.</caption></table></div>';
    }

    function renderTopicSection(topic, ch, index) {
      var safe = escapeHTML(cleanTopic(topic));
      if (topic.indexOf("해독 미션") > -1) {
        return '<div class="box case"><div class="box-label">해독 미션</div><p>' + escapeHTML(explainTopic(topic, ch)) + '</p><ul><li>먼저 아는 글자와 문형에 밑줄을 긋는다.</li><li>모르는 단어는 문맥으로 한 번 추측한 뒤 사전을 확인한다.</li><li>마지막에 전체 뜻을 한국어 한 문장으로 요약한다.</li></ul></div>';
      }
      if (topic.indexOf("문화 한 컷") > -1) {
        return '<div class="box tip"><div class="box-label">문화 한 컷</div><p>' + escapeHTML(explainTopic(topic, ch)) + '</p></div>';
      }
      return '<h3>' + safe + '</h3><p>' + escapeHTML(explainTopic(topic, ch)) + '</p><div class="box law"><div class="box-label">읽는 순서</div><p>' +
        escapeHTML((index + 1) + "단계에서는 개념을 먼저 말로 설명하고, 예문을 읽은 뒤, 한국어식 직역이 어디서 막히는지 확인한다.") +
        '</p></div>';
    }

    function practiceListFor(ch) {
      var topics = (ch.subs || []).filter(function (sub) {
        return sub.indexOf("해독 미션") === -1 && sub.indexOf("문화 한 컷") === -1;
      }).slice(0, 4);
      if (!topics.length) topics = ["핵심 개념 확인", "예문 소리 내어 읽기", "오답 기록"];
      return '<ol class="steps">' + topics.map(function (topic) {
        return '<li><b>' + escapeHTML(cleanTopic(topic)) + '</b>: 오늘 읽은 내용을 한 줄 예문으로 다시 만들고, 헷갈린 표현을 단어장에 남긴다.</li>';
      }).join("") + '</ol>';
    }

    function keytakeFor(ch) {
      var topics = (ch.subs || []).slice(0, 3);
      return '<div class="keytake"><div class="kt-label">이 항목의 핵심</div><ul>' +
        topics.map(function (topic) {
          return '<li>' + escapeHTML(cleanTopic(topic)) + '는 ' + escapeHTML(ch.title) + '을 실제로 운용하기 위한 핵심 축이다.</li>';
        }).join("") +
        '<li>읽기, 말하기, 듣기 중 하나에만 머무르지 말고 짧은 예문으로 세 방향을 모두 확인한다.</li></ul></div>';
    }

    function draftIntroFor(ch) {
      if ((ch.tags || []).indexOf("완독 챌린지") > -1) return '<p class="lead">이 챌린지는 지금까지 배운 내용을 실제 콘텐츠 하나에 적용하는 종합 미션이다. 완벽한 번역보다 끝까지 읽어 내는 경험이 목표다.</p>';
      if ((ch.tags || []).indexOf("자가진단") > -1) return '<p class="lead">체크포인트는 다음 급수로 넘어가기 전 빈틈을 찾는 구간이다. 점수보다 중요한 것은 어떤 유형에서 시간이 새고, 어떤 문형이 반복해서 틀리는지 확인하는 일이다.</p>';
      if ((ch.tags || []).indexOf("부록") > -1) return '<p class="lead">이 부록은 본문에서 배운 내용을 빠르게 다시 찾기 위한 참조 페이지다. 처음부터 외우는 목록이 아니라, 장을 읽은 뒤 회수하고 비교할 때 사용한다.</p>';
      return '<p class="lead">' + escapeHTML(ch.title) + '은(는) ' + escapeHTML(ch.num) + '에서 다루는 핵심 학습 항목이다. 한국어 화자가 빠르게 이해할 수 있는 지점을 먼저 잡고, 시험과 실제 콘텐츠에서 헷갈리는 차이를 따로 훈련한다.</p><p>아래 초안은 목차의 세부 항목을 따라 읽기, 예문 확인, 자기 점검 순서로 구성했다. 처음 읽을 때는 전체 흐름을 잡고, 두 번째 읽을 때는 예문을 소리 내어 반복한다.</p>';
    }

    function draftFor(ch) {
      var tags = ch.tags || [];
      if (tags.indexOf("완독 챌린지") > -1) {
        return draftIntroFor(ch) + '<h3>진행 방법</h3>' + practiceListFor(ch) +
          '<div class="box warn"><div class="box-label">통과 기준</div><p>모르는 표현이 있어도 멈추지 않고 끝까지 읽는다. 다 읽은 뒤 줄거리, 새로 건진 표현, 다음 장에서 보강할 약점을 각각 세 줄로 기록하면 통과다.</p></div>' + keytakeFor(ch);
      }
      if (tags.indexOf("자가진단") > -1) {
        return draftIntroFor(ch) + '<h3>모의고사 운영</h3><p>실전 시간에 맞춰 풀고, 채점 직후에는 점수보다 오답 유형을 먼저 분류한다. 문법 지식 부족, 어휘 부족, 시간 부족, 문제 지시 오독을 따로 표시해야 다음 학습이 선명해진다.</p>' +
          '<div class="table-wrap"><table><thead><tr><th>점검 항목</th><th>통과 기준</th><th>보강법</th></tr></thead><tbody><tr><td>문법</td><td>핵심 문형을 예문 없이 설명할 수 있다.</td><td>틀린 문형을 한 문장씩 새로 만든다.</td></tr><tr><td>어휘</td><td>지문 속 핵심어를 문맥으로 추측한다.</td><td>분야별로 묶어 3일 뒤 재확인한다.</td></tr><tr><td>청해</td><td>문제 유형별로 들어야 할 정보를 미리 정한다.</td><td>스크립트 확인 후 같은 음성을 다시 듣는다.</td></tr></tbody></table></div>' + keytakeFor(ch);
      }
      if (tags.indexOf("부록") > -1) {
        return draftIntroFor(ch) + '<h3>사용법</h3><p>부록은 본문 학습을 대신하지 않는다. 장을 읽은 뒤 헷갈리는 항목을 빠르게 비교하고, 시험 전에는 체크리스트처럼 훑는다.</p>' +
          '<ul class="check"><li>표는 소리 내어 읽으며 예문 하나를 붙인다.</li><li>비슷한 항목은 차이점 한 줄을 직접 적는다.</li><li>시험 직전에는 새 항목 추가보다 이미 표시한 약점을 회수한다.</li></ul>' + exampleTableFor(ch) + keytakeFor(ch);
      }
      return draftIntroFor(ch) +
        (ch.subs || []).map(function (topic, index) { return renderTopicSection(topic, ch, index); }).join("") +
        '<h3>실전 예시</h3>' + exampleTableFor(ch) +
        '<h3>연습 루틴</h3>' + practiceListFor(ch) +
        keytakeFor(ch);
    }

    function chapterVocab(ch) {
      if (!window.VOCABULARY || !Array.isArray(VOCABULARY.entries)) return [];
      return VOCABULARY.entries.filter(function (entry) {
        return entry.chapter === ch.id;
      }).sort(function (a, b) {
        return a.priority - b.priority || a.kana.localeCompare(b.kana, "ja");
      });
    }

    function vocabBoxFor(ch) {
      var words = chapterVocab(ch).slice(0, 8);
      if (!words.length) return "";
      var level = words[0].level || "all";
      return '<section class="vocab-box" aria-label="이 장의 핵심 단어"><div class="vocab-box-head">' +
        '<div class="vocab-box-title">이 장의 핵심 단어</div>' +
        '<a class="vocab-box-link" href="pages/vocabulary.html#' + escapeHTML(level) + '">전체 단어장 보기</a></div>' +
        '<table class="vocab-mini"><tbody>' + words.map(function (word) {
          return '<tr><td><b>' + escapeHTML(word.kana) + '</b><small>' + escapeHTML(word.kanji || word.pos) +
            '</small></td><td>' + escapeHTML(word.meaning) + '</td><td>' + escapeHTML(word.note) + '</td></tr>';
        }).join("") + '</tbody></table></section>';
    }

    function guideDataFor(ch) {
      if (!window.LESSON_GUIDES) return null;
      return LESSON_GUIDES[ch.id] || null;
    }

    function renderGuideList(items, ordered, className) {
      if (!items || !items.length) return "";
      var tag = ordered ? "ol" : "ul";
      var klass = className ? ' class="' + className + '"' : "";
      return "<" + tag + klass + ">" + items.map(function (item) {
        return "<li>" + escapeHTML(String(item)) + "</li>";
      }).join("") + "</" + tag + ">";
    }

    function renderGuideTable(table) {
      if (!table) return "";
      return '<div class="table-wrap"><table><thead><tr>' +
        table.head.map(function (cell) {
          return "<th>" + escapeHTML(String(cell)) + "</th>";
        }).join("") +
        "</tr></thead><tbody>" +
        table.rows.map(function (row) {
          return "<tr>" + row.map(function (cell) {
            return "<td>" + escapeHTML(String(cell)) + "</td>";
          }).join("") + "</tr>";
        }).join("") +
        "</tbody>" + (table.caption ? "<caption>" + escapeHTML(table.caption) + "</caption>" : "") +
        "</table></div>";
    }

    function renderGuideAudio(audio) {
      if (!audio) return "";
      return '<div class="audio-card"><div class="audio-card-head">' +
        '<div class="box-label">청해 오디오</div><div class="audio-title">' + escapeHTML(audio.title) +
        '</div>' + (audio.meta ? '<p class="audio-meta">' + escapeHTML(audio.meta) + "</p>" : "") +
        '</div><audio controls preload="metadata" src="' + escapeHTML(audio.src) + '">' +
        "이 브라우저에서는 오디오를 재생할 수 없다.</audio>" +
        renderGuideTranscript(audio.transcript) +
        "</div>";
    }

    function transcriptParts(text) {
      return text.replace(/([。、])/g, "$1\n").split("\n").map(function (part) {
        return part.trim();
      }).filter(Boolean);
    }

    function transcriptRows(transcript) {
      return transcript.split("\n").reduce(function (rows, rawLine) {
        var line = rawLine.trim();
        var match;
        if (!line) return rows;
        match = line.match(/^([^:：]{1,12})[:：]\s*(.*)$/);
        if (match) {
          transcriptParts(match[2]).forEach(function (part, index) {
            rows.push({ speaker: index === 0 ? match[1] : "", text: part });
          });
          return rows;
        }
        transcriptParts(line).forEach(function (part) {
          rows.push({ speaker: "", text: part });
        });
        return rows;
      }, []);
    }

    function renderGuideTranscript(transcript) {
      if (!transcript) return "";
      return '<details class="audio-script"><summary><span class="audio-script-toggle">대본 보기</span><span class="audio-script-state" aria-hidden="true"></span></summary><div class="audio-transcript">' +
        transcriptRows(transcript).map(function (row) {
          return '<div class="audio-transcript-line"><span class="audio-speaker">' + escapeHTML(row.speaker) +
            '</span><span class="audio-utterance">' + escapeHTML(row.text) + "</span></div>";
        }).join("") + "</div></details>";
    }

    function renderGuideSection(section) {
      return "<h3>" + escapeHTML(section.title) + "</h3>" +
        (section.body ? "<p>" + escapeHTML(section.body) + "</p>" : "") +
        renderGuideAudio(section.audio) +
        renderGuideTable(section.table) +
        (section.note ? '<div class="box law"><div class="box-label">포인트</div><p>' + escapeHTML(section.note) + "</p></div>" : "") +
        renderGuideList(section.list, false, "check");
    }

    function guideKeytakeFor(ch, guide) {
      if (!guide.takeaways || !guide.takeaways.length) return keytakeFor(ch);
      return '<div class="keytake"><div class="kt-label">이 항목의 핵심</div><ul>' +
        guide.takeaways.map(function (item) {
          return "<li>" + escapeHTML(item) + "</li>";
        }).join("") + "</ul></div>";
    }

    function guideFor(ch) {
      var guide = guideDataFor(ch);
      if (!guide) return "";
      return '<p class="lead">' + escapeHTML(guide.lead) + "</p>" +
        (guide.goal ? '<div class="callout">' + escapeHTML(guide.goal) + "</div>" : "") +
        (guide.sections || []).map(renderGuideSection).join("") +
        (guide.exercises && guide.exercises.length ? "<h3>연습문제</h3>" + renderGuideList(guide.exercises, true, "steps") : "") +
        (guide.answers && guide.answers.length ? '<div class="box case"><div class="box-label">정답</div><p>' + escapeHTML(guide.answers.join(" ")) + "</p></div>" : "") +
        guideKeytakeFor(ch, guide);
    }

    function hasWrittenContent(ch) {
      return Boolean(CONTENT[ch.id] || guideDataFor(ch));
    }

    function contentFor(ch) {
      return (CONTENT[ch.id] || guideFor(ch) || draftFor(ch)) + vocabBoxFor(ch);
    }

    function statusFor(ch) {
      return hasWrittenContent(ch) ? "원고 작성됨" : "초안 작성됨";
    }

    function renderDoc(id) {
      var ch = getChapter(id);
      var doc = document.getElementById("doc");
      var topbarTitle = document.getElementById("topbarTitle");
      var tags = (ch.tags || []).map(function (tag, index) {
        var klass = index === 0 ? "case" : "scen";
        return '<span class="badge ' + klass + '">' + escapeHTML(tag) + '</span>';
      }).join("");
      doc.innerHTML = '<div class="doc-head"><div class="chno">' + escapeHTML(ch.num) +
        '</div><h2>' + escapeHTML(ch.title) + '</h2><div class="meta">' + tags +
        '<span class="badge status">' + statusFor(ch) + '</span></div></div>' +
        contentFor(ch);
      topbarTitle.textContent = chapterLabel(ch);
      document.querySelectorAll(".navlink").forEach(function (link) {
        link.classList.toggle("active", link.dataset.id === ch.id);
      });
      document.querySelectorAll(".part").forEach(function (partNode) {
        var isCurrentPart = partNode.dataset.part === partIdForChapter(ch.id);
        if (isCurrentPart && partNode.classList.contains("collapsed")) {
          partNode.classList.remove("collapsed");
          openParts[partNode.dataset.part] = true;
          var toggle = partNode.querySelector(".part-toggle");
          if (toggle) toggle.setAttribute("aria-expanded", "true");
          writeOpenParts();
        }
      });
      renderPager(ch.id);
      setDrawer(false);
    }

    function renderPager(id) {
      var pager = document.getElementById("pager");
      var index = chapters.findIndex(function (item) { return item.id === id; });
      var prev = chapters[index - 1];
      var next = chapters[index + 1];
      pager.innerHTML =
        '<a class="prev ' + (prev ? "" : "disabled") + '" href="' + (prev ? "#" + prev.id : "#") + '">' +
        '<div class="dir">이전</div><div class="t">' + (prev ? escapeHTML(chapterLabel(prev)) : "처음 장") + '</div></a>' +
        '<a class="next ' + (next ? "" : "disabled") + '" href="' + (next ? "#" + next.id : "#") + '">' +
        '<div class="dir">다음</div><div class="t">' + (next ? escapeHTML(chapterLabel(next)) : "마지막 장") + '</div></a>';
    }

    function searchableText(ch) {
      return [ch.num, ch.title].concat(ch.subs || [], [stripHTML(contentFor(ch))]).join(" ");
    }

    function highlight(text, query) {
      var safe = escapeHTML(text);
      if (!query) return safe;
      var escapedQuery = query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      return safe.replace(new RegExp(escapedQuery, "gi"), function (match) {
        return "<mark>" + match + "</mark>";
      });
    }

    function search(query) {
      var box = document.getElementById("sresults");
      var value = query.trim();
      if (!value) {
        box.classList.remove("open");
        box.innerHTML = "";
        return;
      }
      var results = chapters.filter(function (ch) {
        return searchableText(ch).toLowerCase().indexOf(value.toLowerCase()) > -1;
      }).slice(0, 8);
      box.classList.add("open");
      box.innerHTML = results.length ? results.map(function (ch) {
        var text = searchableText(ch);
        var at = text.toLowerCase().indexOf(value.toLowerCase());
        var start = Math.max(0, at - 24);
        var snippet = text.slice(start, start + 76);
        return '<a class="sresult" href="#' + ch.id + '"><b>' + escapeHTML(chapterLabel(ch)) +
          '</b>' + highlight(snippet, value) + '</a>';
      }).join("") : '<div class="sresult"><b>검색 결과 없음</b>다른 단어로 검색해 보라.</div>';
    }

    function toggleTheme() {
      var root = document.documentElement;
      var next = root.getAttribute("data-theme") === "dark" ? "light" : "dark";
      root.setAttribute("data-theme", next);
      localStorage.setItem("aab-theme", next);
    }

    function syncRoute() {
      var id = location.hash.replace("#", "") || "ch00";
      var ch = getChapter(id);
      renderDoc(ch.id);
      JGB_NAV.saveBookLocation(ch.id);
    }

    function setDrawer(open) {
      var sidebar = document.getElementById("sidebar");
      var mobile = window.matchMedia("(max-width: 900px)").matches;
      document.body.classList.toggle("nav-open", open && mobile);
      document.querySelectorAll(".menu-toggle").forEach(function (button) {
        button.setAttribute("aria-expanded", String(open && mobile));
      });
      if (mobile && !open) {
        sidebar.setAttribute("inert", "");
        sidebar.setAttribute("aria-hidden", "true");
      } else {
        sidebar.removeAttribute("inert");
        sidebar.removeAttribute("aria-hidden");
      }
    }

    JGB_NAV.restoreBookHash();
    renderNav();
    setDrawer(false);
    syncRoute();
    JGB_NAV.decorateLinks();
    JGB_NAV.trackBook(function () {
      return getChapter(location.hash.replace("#", "") || "ch00").id;
    });
    JGB_NAV.restoreBookScroll();

    window.addEventListener("hashchange", syncRoute);
    window.addEventListener("resize", function () {
      setDrawer(document.body.classList.contains("nav-open"));
    });
    var searchInput = document.getElementById("search");
    var searchWrap = document.querySelector(".search-wrap");
    var searchClear = document.querySelector(".search-clear");
    searchInput.addEventListener("input", function (event) {
      searchWrap.classList.toggle("has-query", event.target.value.trim().length > 0);
      search(event.target.value);
    });
    searchClear.addEventListener("click", function () {
      searchInput.value = "";
      searchWrap.classList.remove("has-query");
      search("");
      searchInput.focus();
    });
    document.querySelectorAll(".theme-toggle").forEach(function (button) {
      button.addEventListener("click", toggleTheme);
    });
    document.querySelectorAll(".menu-toggle").forEach(function (button) {
      button.addEventListener("click", function () {
        var open = !document.body.classList.contains("nav-open");
        setDrawer(open);
      });
    });
    document.getElementById("bookNav").addEventListener("click", function (event) {
      var toggle = event.target.closest(".part-toggle");
      if (!toggle) return;
      var part = toggle.closest(".part");
      var nextOpen = part.classList.contains("collapsed");
      part.classList.toggle("collapsed", !nextOpen);
      toggle.setAttribute("aria-expanded", String(nextOpen));
      openParts[part.dataset.part] = nextOpen;
      writeOpenParts();
    });
    document.querySelector(".backdrop").addEventListener("click", function () {
      setDrawer(false);
    });
  </script>
</body>
</html>
